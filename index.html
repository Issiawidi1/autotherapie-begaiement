<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Auto-thérapie">
<meta name="theme-color" content="#eeece8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#333330" media="(prefers-color-scheme: dark)">
<title>Auto-thérapie — Bégaiement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeece8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0ddd8;--border2:#ccc;
  --success:#1a7a3e;--success-bg:#e8f5ed;
  --warning:#a05c00;--warning-bg:#fff3e0;
  --danger:#c0392b;--danger-bg:#fdecea;
  --info:#1a5fa8;--info-bg:#e8f0fb;
  --radius:8px;--radius-lg:12px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--text:#f0ede8;--text2:#a8a49e;--text3:#6e6a64;--border:#3a3a36;--border2:#555;--success:#4caf7a;--success-bg:#0f3320;--warning:#ffb74d;--warning-bg:#3a2200;--danger:#ef6c5a;--danger-bg:#3a0f0a;--info:#6ea8e8;--info-bg:#0d2540}
}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:15px;line-height:1.5}
.wrap{max-width:820px;margin:0 auto;padding:1rem 14px calc(2rem + var(--safe-b))}
header{background:var(--bg3);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hi{max-width:820px;margin:0 auto;padding:1rem 14px 0}
h1{font-size:17px;font-weight:600;margin-bottom:1px}
.sub{font-size:11px;color:var(--text3)}
.tabs{display:flex;overflow-x:auto;margin-top:.75rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 12px;border:none;border-bottom:2px solid transparent;background:none;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;min-height:44px;display:flex;align-items:center}
.tab.active{border-bottom-color:var(--text);color:var(--text);font-weight:500}
.tab.tab-session{color:var(--success);font-weight:500}
.tab.tab-session.active{border-bottom-color:var(--success)}
.card{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);overflow:hidden;margin-bottom:10px}
.ch{width:100%;padding:13px 14px;background:none;border:none;text-align:left;display:flex;align-items:center;gap:10px;cursor:pointer;font-family:inherit;color:var(--text);min-height:56px}
.ch:active{background:var(--bg2)}
.cb{padding:0 14px 14px;border-top:1px solid var(--border)}
.num{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:500}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.mt{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.mv{font-size:28px;font-weight:600;line-height:1;margin-bottom:3px}
.ml{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.pb{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:1rem}
.pf{height:100%;border-radius:3px;background:var(--success);transition:width .4s}
.sl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.tip{background:var(--info-bg);border-left:3px solid var(--info);padding:9px 11px;border-radius:0 var(--radius) var(--radius) 0;margin:8px 0 12px}
.tip p{font-size:13px;color:var(--info);line-height:1.5}
.sr{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sb{padding:6px 12px;border-radius:var(--radius);font-size:12px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;min-height:36px}
.sb.ns{background:var(--bg2);font-weight:600}
.sb.ip{background:var(--warning-bg);color:var(--warning);border-color:var(--warning);font-weight:600}
.sb.ma{background:var(--success-bg);color:var(--success);border-color:var(--success);font-weight:600}
textarea,select,input[type=text],input[type=file]{font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);width:100%;padding:9px 11px;font-size:15px;-webkit-appearance:none;appearance:none}
textarea{resize:vertical;line-height:1.5}
.btn{padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;min-height:44px;-webkit-appearance:none;text-decoration:none;justify-content:center}
.btn:active{opacity:.7}
.btn-primary{background:var(--info-bg);color:var(--info);border-color:var(--info)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.btn-success{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.btn-session{background:var(--success);color:#fff;border-color:var(--success);font-size:15px;font-weight:600;padding:14px 24px;width:100%;justify-content:center}
.btn-sm{padding:6px 12px;font-size:12px;min-height:34px}
.btn-yt{background:#ff0000;color:#fff;border-color:#cc0000;font-size:12px;padding:6px 12px;min-height:34px}
.btn-yt-embed{background:var(--bg2);color:var(--text);border:1px solid var(--border2);font-size:12px;padding:6px 12px;min-height:34px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.ei{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px}
.en{width:20px;height:20px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0;margin-top:2px}
.mc{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);margin-bottom:10px;overflow:hidden}
.mh{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;width:100%;background:none;border:none;text-align:left;font-family:inherit;color:var(--text);min-height:56px}
.mh:active{background:var(--bg2)}
.mi{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ec{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:9px}
.tc{width:58px;height:58px;border-radius:50%;border:2.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex-shrink:0;transition:all .3s}
.tc.run{border-color:var(--success);color:var(--success)}
.tc.done{border-color:var(--success);background:var(--success-bg);color:var(--success)}
.vid-wrap{border-radius:var(--radius);overflow:hidden;margin:10px 0;background:#000;position:relative;padding-top:56.25%}
.vid-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.vid-actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.pr{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px}
.dl{width:66px;font-size:13px;font-weight:500;flex-shrink:0}
.je{padding:13px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.wt{display:inline-block;background:var(--danger-bg);color:var(--danger);font-size:12px;padding:3px 9px;border-radius:12px;margin:2px 3px 0 0}
.rw{display:flex;align-items:center;gap:3px;height:28px}
.rw span{display:block;width:3px;background:var(--danger);border-radius:2px;animation:wave .8s ease-in-out infinite}
.rw span:nth-child(2){animation-delay:.12s}.rw span:nth-child(3){animation-delay:.24s}.rw span:nth-child(4){animation-delay:.36s}.rw span:nth-child(5){animation-delay:.48s}
@keyframes wave{0%,100%{height:6px}50%{height:22px}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}
.rs{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.ib{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-top:1rem}
.sm{font-size:11px;color:var(--text3);margin-top:2px}
audio{width:100%;margin-bottom:8px}
.sb-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:5px}
.sb-fill{height:100%;border-radius:2px;transition:width .4s}
.warn-box{background:var(--warning-bg);border:1px solid var(--warning);border-radius:var(--radius);padding:10px 12px;margin-bottom:1rem}
.warn-box p{font-size:13px;color:var(--warning);line-height:1.5}
.del-btn{padding:4px 10px;font-size:11px;border:1px solid var(--danger);color:var(--danger);background:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;flex-shrink:0}
.pl{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;color:var(--text2)}
.export-ta{font-size:12px;line-height:1.6;font-family:monospace;height:200px;background:var(--bg2)}
.lang-badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.lang-fr{background:#e8f0fb;color:#1a5fa8;border-color:#1a5fa8}
.lang-en{background:#fff3e0;color:#a05c00;border-color:#a05c00}

/* ── MODE SÉANCE ─────────────────── */
.session-progress{display:flex;gap:4px;margin-bottom:1.25rem}
.session-step-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.session-step-dot.active{background:var(--success)}
.session-step-dot.current{background:var(--warning)}
.session-block{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);overflow:hidden;margin-bottom:12px}
.session-block-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.session-step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.session-block-body{padding:16px}
.session-done-banner{background:var(--success-bg);border:1px solid var(--success);border-radius:var(--radius-lg);padding:20px;text-align:center;margin-bottom:12px}
.session-muscle-mini{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.session-tc{width:44px;height:44px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;transition:all .3s}
.session-tc.run{border-color:var(--success);color:var(--success)}
.session-tc.done{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.reading-card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:3px solid var(--info)}
.reading-text{font-size:16px;line-height:1.9;color:var(--text);letter-spacing:.01em}
.reading-meta{font-size:11px;color:var(--text3);margin-top:8px}
.step-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;background:none}
.step-check.checked{background:var(--success);border-color:var(--success);color:#fff}
</style>
</head>
<body>
<header>
  <div class="hi">
    <h1>Auto-thérapie — Bégaiement</h1>
    <div class="sub">Programme Malcolm Fraser</div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<div class="wrap"><div id="content"></div></div>

<script>
// ── DONNÉES ──────────────────────────────────────────────────

const RULES=[
  {id:"exp",num:"0",title:"Thérapie expérimentale",subtitle:"Parole lente, amorces douces",phase:"Préliminaire",description:"Parlez très lentement (≈30 mots/min). Prendre ≥1 seconde pour glisser sur le premier son de chaque mot. Prolonger toutes les consonnes et voyelles. Phonation continue.",tip:"Technique provisoire — démontre que le contrôle est possible.",exercises:["Lire un texte en ralentissant progressivement","Amorces douces sur plosives : p, b, t, d, k","Étirer chaque consonne et voyelle","Appliquer dans une vraie conversation"],eq:["Miroir","Enregistreur"]},
  {id:"r1",num:"1",title:"Règle 1",subtitle:"Parlez lentement",phase:"Réduction de la tension",description:"Prendre l'habitude de parler lentement. Pauses courtes et fréquentes. Résister à la pression du temps.",tip:"Objectif progressif : 1 → 2 → 3 → 5 interlocuteurs consécutifs avec débit lent.",exercises:["5-10 min/jour de lecture — débit décroissant","Pause délibérée avant de répondre au téléphone","Résister à l'urgence de parler vite","S'enregistrer et réécouter"],eq:["Enregistreur","Cahier"]},
  {id:"r2",num:"2",title:"Règle 2",subtitle:"Bégayez plus facilement",phase:"Réduction de la tension",description:"Bégayer calmement, sans effort. Prolonger le premier son des mots craints. Mouvements relâchés.",tip:"Ne pas forcer la fluence — glisser doucement sur les sons.",exercises:["Lecture avec mouvements relâchés","Contacts légers sur plosives","Prolonger son initial des mots craints","Aide-mémoire : bracelet ou note"],eq:["Aide-mémoire","Cahier"]},
  {id:"r3",num:"3",title:"Règle 3",subtitle:"Admettez que vous bégayez",phase:"Désensibilisation",description:"Cesser de cacher. Admettre ouvertement. Pratiquer le bégaiement volontaire sur des mots non craints.",tip:"Le bégaiement volontaire doit être doux.",exercises:["Dire à un proche : 'Je bégaie et j'y travaille'","Bégaiement volontaire seul","Transférer en conversation","Aller en magasin et bégayer volontairement"],eq:["Miroir"]},
  {id:"r4",num:"4",title:"Règle 4",subtitle:"Éliminez les symptômes secondaires",phase:"Comportements inadaptés",description:"Identifier et éliminer les mouvements corporels superflus.",tip:"Un seul symptôme à la fois. Rendre involontaire → volontaire → éliminer.",exercises:["Observer dans un miroir pendant appels","Demander à un proche de noter les symptômes","Faire volontairement le symptôme sans parler","Varier consciemment le symptôme"],eq:["Miroir","Vidéo","Cahier"]},
  {id:"r5",num:"5",title:"Règle 5",subtitle:"Éliminez les évitements",phase:"Comportements inadaptés",description:"Cesser évitements, procrastinations, substitutions.",tip:"Chaque évitement renforce la peur. Mieux vaut bégayer 5 min que d'éviter le mot.",exercises:["Inventaire des évitements","Affronter une situation crainte par jour","Utiliser exactement les mots difficiles","Répéter le mot évité en punition"],eq:["Cahier"]},
  {id:"r6",num:"6",title:"Règle 6",subtitle:"Maintenez le contact visuel",phase:"Comportements inadaptés",description:"Contact visuel naturel pendant toutes les conversations.",tip:"Établir le contact 2-3 secondes AVANT de commencer à parler.",exercises:["Miroir : bloquer en maintenant le regard","5 appels face au miroir","Noter la couleur des yeux de 10 personnes"],eq:["Miroir","Cahier"]},
  {id:"r7",num:"7",title:"Règle 7",subtitle:"Analysez vos blocages",phase:"Analyse et correction",description:"Identifier les mouvements musculaires inadaptés lors des blocages.",tip:"La plupart des blocages viennent d'un contact trop serré.",exercises:["Bégayer très lentement pour ressentir les actions musculaires","Observer dans un miroir pendant appels","Enregistrer 5-10 min, réécouter en mimant","Comparer le même son avec et sans bégaiement"],eq:["Miroir","Enregistreur","Cahier"]},
  {id:"r8",num:"8",title:"Règle 8",subtitle:"Corrections des blocages",phase:"Analyse et correction",description:"3 corrections dans l'ordre : Annulation → Pendant le blocage → Pré-blocage.",tip:"Respecter l'ordre : annulation d'abord, puis pendant, puis pré.",exercises:["ANNULATION : compléter → pause → relâchement → analyser → redire lentement","PENDANT : ralentir le blocage → prolonger → se libérer","PRÉ : pause → relâchement → rappel erreur → répétition mentale → dire corrigé"],eq:["Miroir","Cahier"]},
  {id:"r9",num:"9",title:"Règle 9",subtitle:"Ne revenez jamais en arrière",phase:"Contrôle du débit",description:"Maintenir phonation et débit d'air continus.",exercises:["Identifier les répétitions involontaires à l'écoute","Amorce douce + prolongation + transition continue","Maintenir la phonation pendant les difficultés"],eq:["Enregistreur"]},
  {id:"r10",num:"10",title:"Règle 10",subtitle:"Parlez avec intonation",phase:"Qualité de l'élocution",description:"Voix mélodieuse, ferme, naturelle. Varier débit et volume.",tip:"Variation + débit continu = parole détendue.",exercises:["Lire en variant l'intonation","Identifier les passages monotones","Varier volume et débit"],eq:["Enregistreur"]},
  {id:"r11",num:"11",title:"Règle 11",subtitle:"Portez attention à votre fluence",phase:"Renforcement positif",description:"Reconnaître et mémoriser les moments de parole fluide.",tip:"La fluence existe déjà en vous.",exercises:["Noter les conversations réussies","Parler seul devant un miroir","Visualisation : revivre une situation réussie"],eq:["Cahier","Miroir"]},
  {id:"r12",num:"12",title:"Règle 12",subtitle:"Parlez aussi souvent que possible",phase:"Pratique intensive",description:"Maximiser les occasions de parole.",tip:"Parlez à saturation. — Gerald F. Johnson",exercises:["Créer chaque jour une occasion difficile","Utiliser le téléphone activement","Prendre la parole quand l'occasion se présente"],eq:[]}
];

const MUSCLES=[
  {id:"resp",icon:"🫁",name:"Respiratoire",bg:"#e8f5ed",tc:"#1a7a3e",exercises:[
    {name:"Respiration diaphragmatique",dur:60,desc:"Inspirer 4s (ventre sort) → expirer 6s sur 'sss' continu.",note:"Support de la parole.",vid_id:"e1b6tnz-QR0",vid_url:"https://www.youtube.com/watch?v=e1b6tnz-QR0",vid_lang:"FR",vid_label:"Respiration diaphragmatique (UQAM)"},
    {name:"Contrôle du flux d'air",dur:45,desc:"Expirer sur 'mmm' continu et régulier. Volume constant.",note:"Base de l'amorce douce (règle 2).",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=controlled+exhalation+speech+therapy+airflow",vid_lang:"EN",vid_label:"Controlled exhalation"},
    {name:"Soupir laryngé relâché",dur:30,desc:"Inspirer doucement → soupir 'aaah' très relâché.",note:"État laryngé cible avant un mot craint.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=yawn+sigh+technique+voice+relaxation",vid_lang:"EN",vid_label:"Yawn-sigh technique"}
  ]},
  {id:"phon",icon:"🎤",name:"Phonatoire",bg:"#ede8fb",tc:"#5344b5",exercises:[
    {name:"Onset doux",dur:45,desc:"'aaa', 'eee', 'iii' démarrés du silence. Aucun coup de glotte.",note:"Amorce douce de la règle 2.",vid_id:"fV7VT_R-sQI",vid_url:"https://www.youtube.com/watch?v=fV7VT_R-sQI",vid_lang:"EN",vid_label:"Easy onset / soft onset"},
    {name:"Bourdonnement laryngé",dur:45,desc:"'mmm' puis 'nnn' à intensité constante.",note:"Larynx détendu = son régulier.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=humming+voice+warm+up+larynx",vid_lang:"EN",vid_label:"Humming warm-up"},
    {name:"Glissades vocales",dur:30,desc:"Glisser grave → aigu → grave sur 'aaah'.",note:"Cassure = hypercontraction laryngée.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=glissade+vocale+exercice+voix",vid_lang:"FR",vid_label:"Glissades vocales"}
  ]},
  {id:"vel",icon:"🔊",name:"Vélaire",bg:"#fff3e0",tc:"#a05c00",exercises:[
    {name:"Alternance nasale / orale",dur:40,desc:"'mmm' → 'aaa' → 'nnn' → 'ooo'. Sentir le voile monter et descendre.",note:"Voile tendu = voix nasillarde.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=exercice+voile+palais+orthophonie",vid_lang:"FR",vid_label:"Exercice voile du palais"},
    {name:"Sons contrastés",dur:30,desc:"Enchaîner lentement : 'ma-na-ba-da'.",note:"Appliquer sur vos mots difficiles.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=nasal+oral+contrast+speech+exercises",vid_lang:"EN",vid_label:"Nasal/oral contrast"}
  ]},
  {id:"ling",icon:"👅",name:"Lingual",bg:"#fdecea",tc:"#c0392b",exercises:[
    {name:"Mobilisation complète",dur:40,desc:"Langue : sortir → rentrer → gauche → droite → palais → relâcher. 5 cycles.",note:"Langue détendue = condition de fluidité.",vid_id:"kPdVNM8ZNOI",vid_url:"https://www.youtube.com/watch?v=kPdVNM8ZNOI",vid_lang:"FR",vid_label:"Exercices langue — orthophonie"},
    {name:"Contacts légers alvéolaires",dur:45,desc:"'t-d-t-d' et 'l-l-l' avec contacts extrêmement légers.",note:"Suppression de la pression excessive.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=light+articulatory+contacts+stuttering",vid_lang:"EN",vid_label:"Light articulatory contacts"},
    {name:"Prolongation des liquides",dur:40,desc:"'lllll' → 'rrrrr' → 'nnnnn' très lentement.",note:"Conscience proprioceptive linguale.",vid_id:null,vid_url:"https://www.youtube.com/results?search_query=prolongation+consonnes+liquides+articulation",vid_lang:"FR",vid_label:"Prolongation des liquides"}

function fmtSz(b){if(b<1024)return b+"o";if(b<1048576)return Math.round(b/1024)+"Ko";return(b/1048576).toFixed(1)+"Mo"}
function fmt(s){const m=Math.floor(s/60),sc=s%60;return m+":"+(sc<10?"0":"")+sc}

// ── MINUTEURS ────────────────────────────────────────────────
function startTimer(eid,sec,prefix){
  prefix=prefix||"tc-";
  if(timers[eid]){clearInterval(timers[eid]);delete timers[eid]}
  let rem=sec;
  const tick=()=>{
    const el=document.getElementById(prefix+eid),btn=document.getElementById((prefix==="stc-"?"stb-":"tb-")+eid);
    if(!el)return;
    if(rem<=0){clearInterval(timers[eid]);delete timers[eid];el.textContent="✓";el.className=(prefix==="stc-"?"session-tc":"tc")+" done";if(btn){btn.textContent="Terminé";btn.disabled=true}
      if(prefix==="stc-"){S.session.musclesDone[eid]=true;renderSessionStep()}
    }else{el.textContent=rem+"s";el.className=(prefix==="stc-"?"session-tc":"tc")+" run";rem--}
  };
  tick();timers[eid]=setInterval(tick,1000);
  const btn=document.getElementById((prefix==="stc-"?"stb-":"tb-")+eid);if(btn){btn.textContent="En cours…";btn.disabled=true}
}

// ── ENREGISTREMENT ───────────────────────────────────────────
function blobToB64(blob){return new Promise(res=>{const r=new FileReader();r.onloadend=()=>res(r.result);r.readAsDataURL(blob)})}

async function startRecording(fromSession){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    const mt=MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":"audio/ogg";
    recorder=new MediaRecorder(stream,{mimeType:mt});
    recorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};
    recorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(audioChunks,{type:recorder.mimeType});
      const b64=await blobToB64(blob);
      window._lastRec={b64,dur:recSeconds,fromSession:!!fromSession};
      isRecording=false;render();
    };
    recorder.start(1000);isRecording=true;recSeconds=0;
    recTimer=setInterval(()=>{recSeconds++;const el=document.getElementById("rec-timer")||document.getElementById("srec-timer");if(el)el.textContent=fmt(recSeconds)},1000);
    render();
  }catch(e){alert("Microphone inaccessible.\n\n"+e.message)}
}

function stopRecording(){if(recorder&&recorder.state!=="inactive")recorder.stop();clearInterval(recTimer)}

async function saveRecording(fromSession){
  if(!window._lastRec)return;
  if(S.recordings.length>=MAX_RECS){alert("Maximum "+MAX_RECS+" enregistrements.");return}
  const ruleId=fromSession?(S.weekPlan[todayDay()]||"r1"):(document.getElementById("rec-rule")?.value||"r1");
  const obs=fromSession?(document.getElementById("sobs")?.value||""):(document.getElementById("rec-obs")?.value||"");
  const words=fromSession?(document.getElementById("swords")?.value||""):(document.getElementById("rec-words")?.value||"");
  S.recordings=[{id:Date.now(),date:today(),time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),rule:ruleId,obs,words,dur:window._lastRec.dur,b64:window._lastRec.b64},...S.recordings];
  try{save()}catch(e){S.recordings.shift();return}
  if(fromSession){S.session.recorded=true}
  window._lastRec=null;render();
}

function addJournalEntry(fromSession){
  const text=fromSession?S.session.journalText:(document.getElementById("j-text")?.value||"");
  const ruleId=fromSession?(S.weekPlan[todayDay()]||"r1"):(document.getElementById("j-rule")?.value||"r1");
  const rt=fromSession?S.session.rating:parseInt(document.getElementById("j-rating")?.value||3);
  if(!text.trim())return;
  S.journal=[{id:Date.now(),date:today(),rule:ruleId,text,rating:rt},...S.journal];
  save();
  if(!fromSession){document.getElementById("j-text").value="";}
  render();
}

function startSession(){
  S.session={active:true,bloc:0,stepsDone:{},readingLevel:2,recorded:false,journalText:"",rating:3};
  render();
}

function sessionNextBloc(){
  if(S.session.bloc<BLOCS.length-1){S.session.bloc++;render();window.scrollTo(0,0)}
}
function sessionPrevBloc(){if(S.session.bloc>0){S.session.bloc--;render();window.scrollTo(0,0)}}
function toggleStepDone(key){S.session.stepsDone[key]=!S.session.stepsDone[key];renderSessionStep()}

function finishSession(){
  const text=S.session.journalText.trim()||"Séance de 6 blocs complète.";
  const ruleId=S.weekPlan[todayDay()]||"r1";
  S.journal=[{id:Date.now(),date:today(),rule:ruleId,text,rating:S.session.rating},...S.journal];
  save();S.session.active=false;
  flashMsg("Séance enregistrée !");
  setTab("dashboard");
}

function renderSessionStep(){
  const el=document.getElementById("session-body");
  if(!el)return;
  el.innerHTML=buildBlocContent();
}

function buildBlocContent(){
  const bloc=BLOCS[S.session.bloc];
  const todayRuleId=S.weekPlan[todayDay()];
  const todayRule=RULES.find(r=>r.id===todayRuleId);
  const isLast=S.session.bloc===BLOCS.length-1;

  // En-tête du bloc
  let html=`<div style="background:${bloc.color};border-radius:var(--radius-lg);padding:14px;margin-bottom:1rem;border-left:4px solid ${bloc.tc}">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">
      <span style="font-size:22px">${bloc.icon}</span>
      <div><div style="font-size:16px;font-weight:600;color:${bloc.tc}">${bloc.label} — ${bloc.title}</div>
      <div style="font-size:12px;color:${bloc.tc};opacity:.8">${bloc.duration}</div></div>
    </div>
    <p style="font-size:13px;color:${bloc.tc};line-height:1.5;opacity:.9">${bloc.desc}</p>
  </div>`;

  // Règle du jour — rappel dans bloc 5
  if(S.session.bloc===4&&todayRule){
    html+=`<div style="background:var(--bg2);border-radius:var(--radius);padding:11px;margin-bottom:1rem">
      <div style="font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Règle du jour</div>
      <div style="font-size:14px;font-weight:600">${todayRule.title} — ${todayRule.subtitle}</div>
      ${todayRule.tip?`<div style="font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5">${todayRule.tip}</div>`:""}
    </div>`;
  }

  // Texte de lecture — choix niveau dans bloc 5
  if(S.session.bloc===4){
    const lvl=S.session.readingLevel;
    const txt=READING_TEXTS.find(t=>t.level===lvl)||READING_TEXTS[1];
    html+=`<div class="sl" style="margin-bottom:7px">Texte de lecture — niveau</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${READING_TEXTS.map(t=>`<button class="btn btn-sm${lvl===t.level?" btn-success":""}" onclick="S.session.readingLevel=${t.level};renderSessionStep()">${t.level}</button>`).join("")}</div>
    <div class="reading-card" style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:var(--info);margin-bottom:7px">${txt.label}</div><div class="reading-text">${txt.text}</div><div class="reading-meta">${txt.note}</div></div>`;
  }

  // Étapes du bloc
  html+=`<div class="sl" style="margin-bottom:9px">Étapes</div>`;
  bloc.steps.forEach((step,i)=>{
    const done=S.session.stepsDone[step.id];
    const eid="bs-"+step.id;
    html+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px${done?";opacity:.6":""}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div class="step-check ${done?"checked":""}" onclick="toggleStepDone('${step.id}')" style="margin-top:2px;flex-shrink:0">${done?"✓":""}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;margin-bottom:4px">${i+1}. ${step.name} <span style="font-size:11px;color:var(--text3);font-weight:400">${step.dur>=60?Math.floor(step.dur/60)+"min"+(step.dur%60>0?" "+step.dur%60+"s":""):step.dur+"s"}</span></div>
          <p style="font-size:13px;color:var(--text2);line-height:1.5">${step.desc}</p>
        </div>
        <div style="flex-shrink:0">
          <div class="session-tc" id="stc-${eid}" style="color:${bloc.tc};border-color:${bloc.color}">${step.dur>=60?Math.floor(step.dur/60)+"m":step.dur+"s"}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:9px">
        <button id="stb-${eid}" class="btn btn-sm" onclick="startTimer('${eid}',${step.dur},'stc-')">▶ Minuteur</button>
      </div>
    </div>`;
  });

  // Enregistrement dans le bloc 6
  if(isLast){
    html+=`<div class="sl" style="margin-bottom:8px;margin-top:1rem">Enregistrement</div>`;
    if(S.session.recorded){
      html+=`<div style="background:var(--success-bg);border:1px solid var(--success);border-radius:var(--radius);padding:11px;margin-bottom:10px;font-size:13px;color:var(--success)">✓ Enregistrement sauvegardé</div>`;
    }else if(!isRecording&&!window._lastRec){
      html+=`<button class="btn btn-danger" onclick="startRecording(true)" style="margin-bottom:10px;width:100%"><span style="width:9px;height:9px;border-radius:50%;background:currentColor;display:inline-block"></span>Démarrer l'enregistrement</button>`;
    }else if(isRecording){
      html+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div class="rw"><span></span><span></span><span></span><span></span><span></span></div><span id="srec-timer" style="font-size:22px;font-weight:600;color:var(--danger)">0:00</span></div><button class="btn" onclick="stopRecording()">Arrêter</button>`;
    }else if(!isRecording&&window._lastRec&&window._lastRec.fromSession){
      html+=`<div style="margin-bottom:10px"><div class="sl" style="margin-bottom:5px">Réécoute — ${fmt(window._lastRec.dur)}</div><audio controls src="${window._lastRec.b64}"></audio></div>
      <div style="margin-bottom:9px"><input type="text" id="swords" placeholder="Mots difficiles (virgules)"></div>
      <div style="margin-bottom:10px"><textarea id="sobs" rows="2" placeholder="Technique la plus efficace aujourd'hui ?"></textarea></div>
      <div style="display:flex;gap:8px"><button class="btn btn-success" onclick="saveRecording(true)">Sauvegarder</button><button class="btn" onclick="window._lastRec=null;render()">Refaire</button></div>`;
    }

    html+=`<div class="sl" style="margin-bottom:7px;margin-top:1rem">Journal de séance</div>
    <textarea rows="3" placeholder="Points positifs, difficultés, ce qui a bien fonctionné…" oninput="S.session.journalText=this.value" style="margin-bottom:10px">${S.session.journalText}</textarea>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">
      <span style="font-size:13px;color:var(--text2)">Note :</span>
      <div style="display:flex;gap:5px">${[1,2,3,4,5].map(i=>`<button onclick="S.session.rating=${i};renderSessionStep()" style="width:30px;height:30px;border-radius:50%;border:2px solid ${i<=S.session.rating?"var(--success)":"var(--border)"};background:${i<=S.session.rating?"var(--success-bg)":"none"};cursor:pointer;font-size:13px">${i<=S.session.rating?"★":"☆"}</button>`).join("")}</div>
    </div>`;
  }

  // Progression des étapes
  const doneCount=bloc.steps.filter(s=>S.session.stepsDone[s.id]).length;
  html+=`<div style="font-size:12px;color:var(--text3);margin-top:10px">${doneCount}/${bloc.steps.length} étapes cochées</div>`;

  return html;
}

function downloadBackup(){

function importBackup(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(confirm("Importer ? Vos données actuelles seront remplacées.")){if(d.statuses)S.statuses=d.statuses;if(d.notes)S.notes=d.notes;if(d.journal)S.journal=d.journal;if(d.weekPlan)S.weekPlan=d.weekPlan;if(d.recordings)S.recordings=d.recordings;save();render();alert("Importé avec succès.")}}catch(err){alert("Fichier invalide.")}};r.readAsText(file);
}
function downloadAudio(id){
  const rec=S.recordings.find(r=>r.id===id);if(!rec||!rec.b64)return;
  const ext=rec.b64.includes("audio/webm")?"webm":rec.b64.includes("audio/mp4")?"m4a":"ogg";
  const rule=RULES.find(r=>r.id===rec.rule);
  const a=document.createElement("a");a.href=rec.b64;a.download="seance-"+rec.date.replace(/\//g,"-")+"-r"+(rule?rule.num:"0")+"."+ext;a.click();
}
function buildBilanText(){
  const now=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  let t="=== BILAN AUTO-THÉRAPIE BÉGAIEMENT ===\nExporté le "+now+"\n\n--- PROGRESSION ---\n";
  RULES.forEach(r=>{const st=S.statuses[r.id]||"not_started";t+=`Règle ${r.num} — ${r.subtitle} : ${st==="mastered"?"✅ Maîtrisée":st==="in_progress"?"🔄 En cours":"⬜ Non commencée"}\n`});
  const mastered=RULES.filter(r=>S.statuses[r.id]==="mastered").length,inProg=RULES.filter(r=>S.statuses[r.id]==="in_progress").length;
  t+=`\n${mastered} maîtrisées · ${inProg} en cours\n\n--- MOTS SUR LESQUELS JE BUTE ---\n`;
  const wc={};S.recordings.forEach(rec=>{if(rec.words)rec.words.split(",").map(w=>w.trim().toLowerCase()).filter(Boolean).forEach(w=>{wc[w]=(wc[w]||0)+1})});
  const sorted=Object.entries(wc).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)t+="Aucun mot enregistré.\n";else sorted.forEach(([w,c])=>{t+=`• ${w} — ${c} fois\n`});
  t+="\n--- OBSERVATIONS DE SÉANCES ("+S.recordings.length+") ---\n";
  S.recordings.slice(0,8).forEach(e=>{const rule=RULES.find(r=>r.id===e.rule);t+=`\n[${e.date} ${e.time}] ${rule?rule.subtitle:"—"} (${fmt(e.dur||0)})\n`;if(e.words)t+=`Mots difficiles : ${e.words}\n`;if(e.obs)t+=`Observations : ${e.obs}\n`});
  t+="\n--- JOURNAL ("+S.journal.length+" entrées) ---\n";
  S.journal.slice(0,8).forEach(e=>{const rule=RULES.find(r=>r.id===e.rule);t+=`\n[${e.date}] ${rule?rule.subtitle:"—"} ${"★".repeat(e.rating)}${"☆".repeat(5-e.rating)}\n${e.text}\n`});
  t+="\n=== FIN DU BILAN ===\nCollez ce texte dans Claude.ai pour une analyse personnalisée.";
  return t;
}
async function shareBilan(){
  const text=buildBilanText();
  if(navigator.share){try{await navigator.share({title:"Bilan auto-thérapie bégaiement",text})}catch(e){if(e.name!=="AbortError")copyBilan()}}else copyBilan();
}
function copyBilan(){
  navigator.clipboard.writeText(buildBilanText()).then(()=>flashMsg("Copié dans le presse-papier !")).catch(()=>{const ta=document.getElementById("bilan-ta");if(ta){ta.select();document.execCommand("copy");flashMsg("Copié !")}});
}
function flashMsg(msg){
  const d=document.createElement("div");d.textContent=msg;Object.assign(d.style,{position:"fixed",bottom:"1.5rem",left:"50%",transform:"translateX(-50%)",background:"var(--success)",color:"#fff",padding:"10px 20px",borderRadius:"20px",fontSize:"14px",fontWeight:"500",zIndex:"9999",boxShadow:"0 4px 12px rgba(0,0,0,.2)"});
  document.body.appendChild(d);setTimeout(()=>d.remove(),2000);
}
