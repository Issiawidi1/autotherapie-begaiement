<title>Auto-thérapie Bégaiement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f5f2;--bg3:#f0ede8;--text:#1a1a1a;--text2:#5a5a5a;--text3:#999;--border:#e2ddd8;
  --green:#1a7a3e;--green-bg:#e8f5ed;--blue:#1a5fa8;--blue-bg:#e8f0fb;
  --orange:#a05c00;--orange-bg:#fff3e0;--red:#c0392b;--red-bg:#fdecea;
  --purple:#5344b5;--purple-bg:#ede8fb;--pink:#9c2462;--pink-bg:#fdeef5;
  --r:8px;--rl:14px;--safe:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2b;--text:#f0ede8;--text2:#a8a49e;--text3:#666;--border:#3a3836;
  --green:#4caf7a;--green-bg:#0d2e1a;--blue:#6ea8e8;--blue-bg:#0d2540;
  --orange:#ffb74d;--orange-bg:#2e1a00;--red:#ef6c5a;--red-bg:#2e0e08;
  --purple:#9b8fe0;--purple-bg:#1e1940;--pink:#d47ab0;--pink-bg:#2e0e20;
}}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:15px;line-height:1.5}
.wrap{max-width:780px;margin:0 auto;padding:1rem 14px calc(2.5rem + var(--safe))}
header{background:var(--bg3);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hi{max-width:780px;margin:0 auto;padding:.9rem 14px 0}
h1{font-size:16px;font-weight:600}.sub{font-size:11px;color:var(--text3);margin-top:1px}
.tabs{display:flex;overflow-x:auto;margin-top:.7rem;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border:none;border-bottom:2px solid transparent;background:none;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;min-height:42px}
.tab.active{border-bottom-color:var(--text);color:var(--text);font-weight:500}
.tab-g{color:var(--green)!important}.tab-g.active{border-bottom-color:var(--green)!important}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.ch{width:100%;padding:13px 14px;background:none;border:none;text-align:left;display:flex;align-items:center;gap:10px;cursor:pointer;font-family:inherit;color:var(--text);min-height:54px}
.ch:active{background:var(--bg2)}.cb{padding:14px;border-top:1px solid var(--border)}
.sl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.note{background:var(--blue-bg);border-left:3px solid var(--blue);padding:9px 11px;border-radius:0 var(--r) var(--r) 0;margin:8px 0 12px;font-size:13px;color:var(--blue);line-height:1.5}
.warn{background:var(--orange-bg);border-left:3px solid var(--orange);padding:9px 11px;border-radius:0 var(--r) var(--r) 0;margin:8px 0;font-size:13px;color:var(--orange)}
.alert{background:var(--red-bg);border-left:3px solid var(--red);padding:9px 11px;border-radius:0 var(--r) var(--r) 0;margin:8px 0;font-size:13px;color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;min-height:42px;text-decoration:none;-webkit-appearance:none}
.btn:active{opacity:.7}.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-full{width:100%;justify-content:center}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}
.btn-sm{padding:6px 11px;font-size:12px;min-height:32px}
.btn-start{background:var(--green);color:#fff;border-color:var(--green);font-size:15px;font-weight:600;padding:14px;width:100%;justify-content:center;border-radius:var(--rl)}
.btn-presit{background:var(--orange);color:#fff;border-color:var(--orange);font-size:14px;font-weight:600;padding:12px;width:100%;justify-content:center;border-radius:var(--rl)}
.btn-long{background:var(--purple);color:#fff;border-color:var(--purple);font-size:14px;font-weight:600;padding:12px;width:100%;justify-content:center;border-radius:var(--rl)}
.btn-yt{background:#f00;color:#fff;border-color:#c00}
input,textarea,select{font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;font-size:15px;-webkit-appearance:none;width:100%}
textarea{resize:vertical;line-height:1.5}
.timer-ring{width:54px;height:54px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;transition:all .3s}
.timer-ring.running{border-color:var(--green);color:var(--green)}
.timer-ring.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.vid-box{border-radius:var(--r);overflow:hidden;background:#000;position:relative;padding-top:56.25%;margin:8px 0}
.vid-box iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.prog-bar{display:flex;gap:4px;margin-bottom:1rem}
.prog-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.prog-dot.done{background:var(--green)}.prog-dot.cur{background:var(--orange)}
.step{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.step.done-step{opacity:.55}
.check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;transition:all .2s;background:none}
.check.on{background:var(--green);border-color:var(--green);color:#fff}
.word-chip{display:inline-block;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;margin:3px;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange)}
.phrase-box{background:var(--bg2);border-left:3px solid var(--orange);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-bottom:7px;font-size:14px;line-height:1.6}
.start-phrase{background:var(--blue-bg);border-left:3px solid var(--blue);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-bottom:7px;font-size:14px;line-height:1.6;color:var(--blue);font-weight:500}
.wave{display:flex;align-items:center;gap:3px;height:26px}
.wave span{display:block;width:3px;background:var(--red);border-radius:2px;animation:wv .8s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.12s}.wave span:nth-child(3){animation-delay:.24s}.wave span:nth-child(4){animation-delay:.36s}.wave span:nth-child(5){animation-delay:.48s}
@keyframes wv{0%,100%{height:5px}50%{height:20px}}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px}
.dot{width:8px;height:8px;border-radius:50%}
.del-btn{font-size:11px;padding:4px 9px;border:1px solid var(--red);color:var(--red);background:none;border-radius:var(--r);cursor:pointer;flex-shrink:0;font-family:inherit}
.sb-bar{height:4px;border-radius:2px;overflow:hidden;background:var(--bg2);margin-top:4px}
.sb-fill{height:100%;border-radius:2px;transition:width .4s}
audio{width:100%;margin:6px 0}
.mode-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:10px}
.mode-icon{font-size:28px;margin-bottom:8px}
.profile-bar{height:8px;border-radius:4px;overflow:hidden;background:var(--bg2);margin:6px 0}
.profile-fill{height:100%;border-radius:4px}
</style>
</head>

{id:"massage",num:1,icon:"💆",name:"Massage laryngé",color:"var(--pink)",bg:"var(--pink-bg)",dur:"3 min",

{id:"resp",num:3,icon:"🫁",name:"Respiration abdominale",color:"var(--green)",bg:"var(--green-bg)",dur:"2 min",

function today(){return new Date().toLocaleDateString("fr-FR")}
function fmt(s){const m=Math.floor(s/60),sc=s%60;return m+":"+(sc<10?"0":"")+sc}
function storUsed(){try{const d=localStorage.getItem(KEY);return d?d.length*2:0}catch(e){return 0}}
function fmtSz(b){return b<1048576?Math.round(b/1024)+"Ko":(b/1048576).toFixed(1)+"Mo"}

// Random daily
function dailySeed(){const s=new Date().toDateString();let h=0;for(let c of s)h=((h<<5)-h)+c.charCodeAt(0);return h>>>0}
function seededPick(arr,n,seed){let h=seed;const pick=(max)=>{h=(h*1664525+1013904223)>>>0;return h%max};const pool=[...arr],res=[];while(res.length<n&&pool.length>0){const i=pick(pool.length);res.push(pool.splice(i,1)[0])}return res}
function getDailyData(){
  const s=dailySeed();
  return{
    plosives:seededPick(MOTS_PLOSIVES,5,s),
    voyelles:seededPick(MOTS_VOYELLES,4,s+1),
    fricatifs:seededPick(MOTS_FRICATIF,3,s+2),
    phrases:seededPick(PHRASES_BV,5,s+3),
    startPhrases:seededPick(START_PHRASES,5,s+4),
    sujet:seededPick(SUJETS_PAROLE,1,s+5)[0],
  };
}

// ── TIMERS ────────────────────────────────────────────────────────────────
function startTimer(eid,sec,prefix){
  prefix=prefix||"tr-";
  if(timers[eid]){clearInterval(timers[eid]);delete timers[eid]}
  let rem=sec;
  const tick=()=>{
    const el=document.getElementById(prefix+eid),btn=document.getElementById("tb-"+eid);
    if(!el)return;
    if(rem<=0){clearInterval(timers[eid]);delete timers[eid];el.textContent="✓";el.className="timer-ring done";if(btn){btn.textContent="Terminé";btn.disabled=true}}
    else{el.textContent=rem<60?rem+"s":Math.ceil(rem/60)+"m";el.className="timer-ring running";rem--}
  };
  tick();timers[eid]=setInterval(tick,1000);
  const btn=document.getElementById("tb-"+eid);if(btn){btn.textContent="En cours…";btn.disabled=true}
}

// ── ENREGISTREMENT ────────────────────────────────────────────────────────
function b64(blob){return new Promise(r=>{const fr=new FileReader();fr.onloadend=()=>r(fr.result);fr.readAsDataURL(blob)})}
async function startRec(ctx){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    chunks=[];
    const mt=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg"].find(t=>MediaRecorder.isTypeSupported(t));
    recorder=new MediaRecorder(stream,{mimeType:mt});
    recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    recorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:recorder.mimeType});
      window._rec={b64:await b64(blob),dur:recSecs,ctx};
      isRec=false;render();
    };
    recorder.start(1000);isRec=true;recSecs=0;
    recTimer=setInterval(()=>{recSecs++;const el=document.getElementById("rec-time");if(el)el.textContent=fmt(recSecs)},1000);
    render();
  }catch(e){alert("Microphone inaccessible.\n"+e.message)}
}
function stopRec(){if(recorder&&recorder.state!=="inactive")recorder.stop();clearInterval(recTimer)}
async function saveRec(module_id){
  if(!window._rec||S.recordings.length>=15)return;
  const obs=document.getElementById("rec-obs")?.value||"";
  const words=document.getElementById("rec-words")?.value||"";
  S.recordings=[{id:Date.now(),date:today(),time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),module:module_id||"parole",obs,words,dur:window._rec.dur,b64:window._rec.b64},...S.recordings];
  try{save()}catch(e){S.recordings.shift();return}
  if(window._rec.ctx==="session")S.session.recorded=true;
  if(window._rec.ctx==="long")S.long.recorded=true;
  window._rec=null;render();
}
function delRec(id){if(!confirm("Supprimer ?"))return;S.recordings=S.recordings.filter(r=>r.id!==id);save();render()}
function dlAudio(id){
  const r=S.recordings.find(r=>r.id===id);if(!r)return;
  const ext=r.b64.includes("webm")?"webm":r.b64.includes("mp4")?"m4a":"ogg";
  const a=document.createElement("a");a.href=r.b64;a.download="seance-"+r.date.replace(/\//g,"-")+"."+ext;a.click();
}

function toggleDone(k){S.session.done[k]=!S.session.done[k];rebuildBlocBody()}
function rebuildBlocBody(){const el=document.getElementById("bloc-body");if(el)el.innerHTML=buildBlocContent()}
function finishSession(){

  save();S.session.active=false;flashMsg("Séance enregistrée !");S.tab="journal";render();

function buildBlocContent(){
  const b=BLOCS[S.session.bloc];
  const mods=b.mids.map(id=>MODULES.find(m=>m.id===id)).filter(Boolean);
  const daily=getDailyData();
  let html="";

  // Bloc note
  html+=`<div class="warn" style="margin-bottom:12px">${b.note}</div>`;

  mods.forEach(mod=>{
    html+=`<div style="background:${mod.bg};border-radius:var(--rl);padding:12px;margin-bottom:12px;border-left:4px solid ${mod.color}">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:5px">
        <span style="font-size:20px">${mod.icon}</span>
        <div><div style="font-size:14px;font-weight:600;color:${mod.color}">${mod.name}</div>
        <div style="font-size:11px;color:${mod.color};opacity:.8">${mod.dur}</div></div>
      </div>
      <p style="font-size:13px;color:${mod.color};opacity:.85;line-height:1.5">${mod.desc}</p>
    </div>`;

    // Phrases de démarrage
    if(mod.showStartPhrases){
      html+=`<div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px">
        <div class="sl" style="margin-bottom:7px">Phrases d'ouverture du jour</div>
        ${daily.startPhrases.map(p=>`<div class="start-phrase">${p}</div>`).join("")}
      </div>`;
    }

    // Mots aléatoires
    if(mod.random){
      html+=`<div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px">
        <div class="sl" style="margin-bottom:7px">Mots du jour</div>
        <div style="margin-bottom:6px"><span style="font-size:11px;color:var(--text3)">Plosives :</span><br>${daily.plosives.map(w=>`<span class="word-chip">b-b-${w}</span>`).join("")}</div>
        <div style="margin-bottom:6px"><span style="font-size:11px;color:var(--text3)">Voyelles :</span><br>${daily.voyelles.map(w=>`<span class="word-chip">hhh-${w}</span>`).join("")}</div>
        <div style="margin-bottom:10px"><span style="font-size:11px;color:var(--text3)">Fricatives :</span><br>${daily.fricatifs.map(w=>`<span class="word-chip">sss-${w}</span>`).join("")}</div>
        <div class="sl" style="margin-bottom:6px">Phrases du jour</div>
        ${daily.phrases.map(p=>`<div class="phrase-box">${p}</div>`).join("")}
      </div>`;
    }

    // Sujet parole libre
    if(mod.showTopic){
      html+=`<div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px">
        <div class="sl" style="margin-bottom:5px">Sujet du jour</div>
        <div style="font-size:15px;font-weight:500;color:var(--orange)">${daily.sujet}</div>
      </div>`;
    }

    // Étapes
    html+=`<div class="sl" style="margin-bottom:7px">Étapes</div>`;
    mod.steps.forEach((step,i)=>{
      const done=S.session.done[step.id];
      const eid="sess-"+step.id;
      if(step.dur===0){
        html+=buildRecStep(eid,done,"session");return;
      }
      html+=`<div class="step${done?" done-step":""}">
        <div class="check${done?" on":""}" onclick="toggleDone('${step.id}')">${done?"✓":""}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;margin-bottom:3px">${i+1}. ${step.name}
            <span style="font-size:11px;color:var(--text3);font-weight:400"> · ${step.dur>=60?Math.floor(step.dur/60)+"min"+((step.dur%60)>0?" "+step.dur%60+"s":""):step.dur+"s"}</span>
          </div>
          <p style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px">${step.desc}</p>
          <div class="timer-ring" id="tr-${eid}" style="display:inline-flex">${step.dur>=60?Math.floor(step.dur/60)+"m":step.dur+"s"}</div>
          <button id="tb-${eid}" class="btn btn-sm" onclick="startTimer('${eid}',${step.dur})" style="margin-left:8px">▶ Minuteur</button>
        </div>
      </div>`;
    });

    if(mod.videos?.length){html+=renderVideos(mod.videos,"sess-"+mod.id)}
    html+=`<div style="height:10px"></div>`;
  });

  // Journal dernier bloc
  if(S.session.bloc===BLOCS.length-1){
    html+=`<div class="sl" style="margin-bottom:7px;margin-top:1rem">Bilan de séance</div>
    <textarea rows="3" placeholder="Points positifs, technique efficace, mots difficiles…" oninput="S.session.jText=this.value" style="margin-bottom:10px">${S.session.jText}</textarea>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:.5rem">
      <span style="font-size:13px;color:var(--text2)">Note :</span>
      <div style="display:flex;gap:5px">${[1,2,3,4,5].map(i=>`<button onclick="S.session.rating=${i};rebuildBlocBody()" style="width:30px;height:30px;border-radius:50%;border:2px solid ${i<=S.session.rating?"var(--green)":"var(--border)"};background:${i<=S.session.rating?"var(--green-bg)":"none"};cursor:pointer;font-size:13px">${i<=S.session.rating?"★":"☆"}</button>`).join("")}</div>
    </div>`;
  }

  const totalSteps=mods.reduce((a,m)=>a+m.steps.filter(s=>s.dur>0).length,0);
  const doneSteps=mods.reduce((a,m)=>a+m.steps.filter(s=>s.dur>0&&S.session.done[s.id]).length,0);
  html+=`<div style="font-size:12px;color:var(--text3);margin-top:8px">${doneSteps}/${totalSteps} étapes cochées</div>`;
  return html;
}

function buildRecStep(eid,done,ctx){
  if(S.session.recorded||S.long.recorded){
    return`<div class="step" style="background:var(--green-bg);border-color:var(--green)"><span style="color:var(--green);font-size:16px">✓</span><div style="font-size:13px;color:var(--green)">Enregistrement sauvegardé</div></div>`;
  }
  if(!isRec&&!window._rec){
    return`<div class="step"><div class="check${done?" on":""}" onclick="toggleDone('${eid}')">${done?"✓":""}</div><div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:6px">Enregistrement de la parole libre</div><button class="btn btn-red" onclick="startRec('${ctx}')"><span style="width:9px;height:9px;border-radius:50%;background:currentColor;display:inline-block"></span> Démarrer</button></div></div>`;
  }
  if(isRec){
    return`<div class="step"><div style="flex:1"><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div class="wave"><span></span><span></span><span></span><span></span><span></span></div><span id="rec-time" style="font-size:20px;font-weight:600;color:var(--red)">0:00</span></div><button class="btn" onclick="stopRec()">Arrêter</button></div></div>`;
  }
  if(window._rec){
    return`<div class="step"><div style="flex:1">
      <div class="sl" style="margin-bottom:4px">Réécoute — ${fmt(window._rec.dur)}</div>
      <audio controls src="${window._rec.b64}"></audio>
      <input id="rec-words" placeholder="Mots difficiles (virgules)" style="margin-bottom:7px">
      <textarea id="rec-obs" rows="2" placeholder="Technique la plus efficace ?"></textarea>
      <div style="display:flex;gap:7px;margin-top:8px">
        <button class="btn btn-green" onclick="saveRec('parole')">Sauvegarder</button>
        <button class="btn" onclick="window._rec=null;render()">Refaire</button>
      </div>
    </div></div>`;
  }
  return"";
}

    <div style="font-size:13px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:1rem">${step.desc}</div>
    ${S.presit.step===3?`<div style="margin-bottom:12px">${daily.startPhrases.map(p=>`<div class="start-phrase">${p}</div>`).join("")}</div>`:""}
    <div style="text-align:center;margin-bottom:1rem">
      <div class="timer-ring" id="tr-ps${S.presit.step}" style="display:inline-flex;width:64px;height:64px;font-size:16px">${step.dur}s</div>
      <button id="tb-ps${S.presit.step}" class="btn btn-sm btn-orange" onclick="startTimer('ps${S.presit.step}',${step.dur})" style="margin-left:10px">▶ Minuteur</button>
    </div>
    <div style="display:flex;gap:8px">
      ${S.presit.step>0?`<button class="btn" onclick="prevPresitStep()" style="flex:1">←</button>`:""}
      ${!isLast?`<button class="btn btn-orange" onclick="nextPresitStep()" style="flex:2;justify-content:center">Suivant →</button>`
      :`<button class="btn-presit" onclick="nextPresitStep()" style="flex:2">Prêt. Bonne chance ✓</button>`}
    </div>
    <button onclick="S.presit.active=false;render()" style="width:100%;margin-top:9px;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:6px">Annuler</button>`;
  }

  // Parole longue active
  if(S.long.active){
    const daily=getDailyData();
    const topics=seededPick(SUJETS_PAROLE,LONG_TOPICS_COUNT,dailySeed()+10);
    return`
    <div style="background:var(--purple-bg);border:2px solid var(--purple);border-radius:var(--rl);padding:14px;margin-bottom:1rem;text-align:center">
      <div style="font-size:13px;font-weight:600;color:var(--purple)">💪 PAROLE LONGUE — ENTRAÎNEMENT FATIGUE</div>
      <div id="long-timer" style="font-size:36px;font-weight:600;color:var(--purple);margin:8px 0">${fmt(S.long.elapsed)}</div>
      <div style="font-size:12px;color:var(--purple);opacity:.8">Objectif : 25 minutes continues</div>
      <div class="profile-bar"><div class="profile-fill" style="width:${Math.min(100,S.long.elapsed/1500*100)}%;background:var(--purple)"></div></div>
    </div>
    <div class="warn" style="margin-bottom:12px">Règles pendant les 25 minutes : débit lent constant · onset doux à chaque démarrage de phrase · corrections pull-out sur chaque blocage · ne jamais s'arrêter plus de 3 secondes</div>
    <div class="sl" style="margin-bottom:8px">Sujets à enchaîner (changez toutes les 5 min)</div>
    ${topics.map((t,i)=>`<div style="background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--purple-bg);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${i+1}</div>
      <span style="font-size:14px">${t}</span>
    </div>`).join("")}
    ${!S.long.recorded?buildRecStep("long-rec",false,"long"):""}
    ${S.long.elapsed>=1500||S.long.elapsed>0?`
    <div style="margin-top:1rem"><div class="sl" style="margin-bottom:6px">Bilan</div>
    <textarea rows="3" placeholder="Comment s'est passée la tenue dans la durée ?" oninput="S.long.jText=this.value" style="margin-bottom:10px">${S.long.jText}</textarea>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
      <span style="font-size:13px;color:var(--text2)">Note :</span>
      <div style="display:flex;gap:5px">${[1,2,3,4,5].map(i=>`<button onclick="S.long.rating=${i};render()" style="width:28px;height:28px;border-radius:50%;border:2px solid ${i<=S.long.rating?"var(--purple)":"var(--border)"};background:${i<=S.long.rating?"var(--purple-bg)":"none"};cursor:pointer;font-size:12px">${i<=S.long.rating?"★":"☆"}</button>`).join("")}</div>
    </div>
    <button class="btn-long" onclick="finishLong()">Terminer et enregistrer ✓</button></div>`:""}
    <button onclick="if(confirm('Abandonner ?')){clearInterval(longTimer);S.long.active=false;render()}" style="width:100%;margin-top:9px;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:6px">Abandonner</button>`;
  }

  // Séance guidée active
  if(S.session.active){
    const b=BLOCS[S.session.bloc];
    const isLast=S.session.bloc===BLOCS.length-1;
    return`
    <div class="prog-bar">${BLOCS.map((_,i)=>`<div class="prog-dot${i<S.session.bloc?" done":i===S.session.bloc?" cur":""}"></div>`).join("")}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem">
      <div><div style="font-size:15px;font-weight:600">${b.icon} ${b.title}</div>
      <div style="font-size:12px;color:var(--text3)">Bloc ${S.session.bloc+1}/${BLOCS.length} · ${b.dur}</div></div>
      <div style="font-size:12px;color:var(--text3)">${today()}</div>
    </div>
    <div id="bloc-body">${buildBlocContent()}</div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      ${S.session.bloc>0?`<button class="btn" onclick="prevBloc()" style="flex:1">← Précédent</button>`:""}
      ${!isLast?`<button class="btn btn-green" onclick="nextBloc()" style="flex:2;justify-content:center">Bloc suivant →</button>`
      :`<button class="btn-start" onclick="finishSession()">Terminer la séance ✓</button>`}
    </div>
    <button onclick="if(confirm('Abandonner la séance ?')){S.session.active=false;render()}" style="width:100%;margin-top:8px;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:6px">Abandonner</button>`;
  }

  // Écran d'accueil séance
  return`
  <div style="text-align:center;padding:1rem 0">
    <div style="font-size:36px;margin-bottom:8px">🎯</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:6px">Séance quotidienne</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:.75rem">4 blocs · 20–23 minutes<br>Adapté à votre profil acoustique</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:1.5rem">2 à 3 séances par jour</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem">
    ${BLOCS.map(b=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center">
      <div style="font-size:18px;margin-bottom:4px">${b.icon}</div>
      <div style="font-size:11px;font-weight:600;color:var(--text2);line-height:1.3">${b.title}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${b.dur}</div>
    </div>`).join("")}
  </div>
  <button class="btn-start" onclick="startSession()">▶ Commencer la séance</button>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
    <button class="btn-presit" onclick="startPreSit()">⚡ Pré-situation 5 min</button>
    <button class="btn-long" onclick="startLong()">💪 Parole longue 25 min</button>
  </div>`;
}

function renderModules(){
  const daily=getDailyData();
  let html=`<p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem">8 modules adaptés à votre profil. Le module Démarrage est prioritaire — c'est votre vulnérabilité n°1.</p>`;
  MODULES.forEach(mod=>{
    const isOpen=S.expanded===mod.id;
    html+=`<div class="card">
      <button class="ch" onclick="S.expanded=S.expanded==='${mod.id}'?null:'${mod.id}';render()">
        <div style="width:42px;height:42px;border-radius:var(--r);background:${mod.bg};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${mod.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500">${mod.num}. ${mod.name}${mod.id==="demarrage"?' <span style="font-size:10px;background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:10px;font-weight:600">PRIORITÉ 1</span>':""}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px">${mod.dur}</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="transform:${isOpen?"rotate(180deg)":"none"};transition:transform .2s;flex-shrink:0"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      ${isOpen?`<div class="cb">
        <div style="background:${mod.bg};border-radius:var(--r);padding:12px;margin-bottom:12px;border-left:3px solid ${mod.color}">
          <p style="font-size:13px;color:var(--text);line-height:1.6">${mod.desc}</p>
        </div>
        ${mod.id==="demarrage"?`<div class="alert">Données enregistrements : blocages de 5 à 10s dans les 60 premières secondes des deux entretiens. Ce module doit être pratiqué chaque jour sans exception.</div>`:""}
        <div class="sl" style="margin-bottom:8px">Exercices</div>
        ${mod.steps.filter(s=>s.dur>0).map((s,i)=>`<div style="display:flex;gap:9px;margin-bottom:9px">
          <div style="width:22px;height:22px;border-radius:50%;background:${mod.bg};display:flex;align-items:center;justify-content:center;font-size:11px;color:${mod.color};flex-shrink:0;margin-top:1px;font-weight:600">${i+1}</div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:2px">${s.name} <span style="font-weight:400;color:var(--text3)">${s.dur>=60?Math.floor(s.dur/60)+"min":s.dur+"s"}</span></div>
          <div style="font-size:13px;color:var(--text2);line-height:1.5">${s.desc}</div></div>
        </div>`).join("")}
        ${mod.showStartPhrases?`<div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin:10px 0"><div class="sl" style="margin-bottom:7px">Phrases d'ouverture du jour</div>${daily.startPhrases.map(p=>`<div class="start-phrase">${p}</div>`).join("")}</div>`:""}
        ${mod.random?`<div style="background:var(--bg2);border-radius:var(--r);padding:12px;margin:10px 0"><div class="sl" style="margin-bottom:7px">Mots du jour</div>${[...daily.plosives,...daily.voyelles,...daily.fricatifs].map(w=>`<span class="word-chip" style="font-size:12px">${w}</span>`).join("")}</div>`:""}
        ${mod.showTopic?`<div style="background:var(--bg2);border-radius:var(--r);padding:10px;margin:8px 0"><div class="sl" style="margin-bottom:5px">Sujet du jour</div><div style="font-size:14px;font-weight:500;color:var(--orange)">${daily.sujet}</div></div>`:""}
        ${renderVideos(mod.videos||[],"mod-"+mod.id)}
      </div>`:""}
    </div>`;
  });
  return html;
}

function renderRecording(){
  const used=storUsed(),max=5*1024*1024,pct=Math.min(100,Math.round((used/max)*100));
  const barCol=pct>80?"var(--red)":pct>55?"var(--orange)":"var(--green)";
  return`
  <div class="card" style="margin-bottom:12px"><div style="padding:14px">
    <div class="sl" style="margin-bottom:9px">Enregistrement libre</div>
    <div style="background:var(--bg2);border-radius:var(--r);padding:9px 11px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>Stockage</span><span>${fmtSz(used)} / ~5 Mo · ${S.recordings.length}/15</span></div>
      <div class="sb-bar"><div class="sb-fill" style="width:${pct}%;background:${barCol}"></div></div>
    </div>
    ${!isRec&&!window._rec?`<button class="btn btn-red" onclick="startRec('libre')"><span style="width:9px;height:9px;border-radius:50%;background:currentColor;display:inline-block"></span> Démarrer</button>`:""}
    ${isRec?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div class="wave"><span></span><span></span><span></span><span></span><span></span></div><span id="rec-time" style="font-size:22px;font-weight:600;color:var(--red)">0:00</span></div><button class="btn" onclick="stopRec()">Arrêter</button>`:""}
    ${!isRec&&window._rec&&window._rec.ctx==="libre"?`
      <div class="sl" style="margin-bottom:4px">Réécoute — ${fmt(window._rec.dur)}</div>
      <audio controls src="${window._rec.b64}"></audio>
      <select id="rec-mod" style="margin-bottom:8px">${MODULES.map(m=>`<option value="${m.id}">${m.num}. ${m.name}</option>`).join("")}</select>
      <input id="rec-words" placeholder="Mots difficiles (virgules)" style="margin-bottom:8px">
      <textarea id="rec-obs" rows="2" placeholder="Observations"></textarea>
      <div style="display:flex;gap:7px;margin-top:9px">
        <button class="btn btn-green" onclick="saveRec(document.getElementById('rec-mod')?.value)">Sauvegarder</button>
        <button class="btn" onclick="window._rec=null;render()">Annuler</button>
      </div>`:""}
  </div></div>
  ${!S.recordings.length?`<div class="empty">Aucun enregistrement.</div>`:
  S.recordings.map(e=>{
    const mod=MODULES.find(m=>m.id===e.module);
    const words=e.words?e.words.split(",").map(w=>w.trim()).filter(Boolean):[];
    return`<div class="card"><div style="padding:13px 14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
        <div><div style="font-size:14px;font-weight:500">${mod?mod.name:"Séance"}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:1px">${e.date} ${e.time} · ${fmt(e.dur||0)}</div></div>
        <button class="del-btn" onclick="delRec(${e.id})">Supprimer</button>
      </div>
      ${words.length?`<div style="margin-bottom:7px">${words.map(w=>`<span style="display:inline-block;background:var(--red-bg);color:var(--red);font-size:12px;padding:2px 9px;border-radius:12px;margin:2px 3px 0 0">${w}</span>`).join("")}</div>`:""}
      ${e.obs?`<p style="font-size:13px;color:var(--text2);margin-bottom:8px">${e.obs}</p>`:""}
      <audio controls src="${e.b64}"></audio>
      <button class="btn btn-sm btn-blue" onclick="dlAudio(${e.id})" style="margin-top:6px">Télécharger</button>
    </div></div>`;
  }).join("")}`;
}

function renderJournal(){
  return`
  <div class="card" style="margin-bottom:12px"><div style="padding:14px">
    <div class="sl" style="margin-bottom:9px">Entrée manuelle</div>
    <textarea id="j-text" rows="4" placeholder="Observations, points positifs, difficultés…"></textarea>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0">
      <span style="font-size:13px;color:var(--text2)">Note :</span>
      <select id="j-rating" style="width:auto;padding:8px 10px">${[1,2,3,4,5].map(i=>`<option value="${i}"${i===3?" selected":""}>${i}/5</option>`).join("")}</select>
    </div>
    <button class="btn btn-green" onclick="addJournal()">Enregistrer</button>
  </div></div>
  ${!S.journal.length?`<div class="empty">Aucune entrée. Les séances remplissent le journal automatiquement.</div>`:
  S.journal.map(e=>`<div class="card"><div style="padding:13px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span style="font-size:12px;color:var(--text3)">${e.date} · ${e.type==="long"?"Parole longue":e.type==="session"?"Séance":"Manuel"}</span>
      <div style="display:flex;gap:2px">${[1,2,3,4,5].map(i=>`<div class="dot" style="background:${i<=e.rating?"var(--green)":"var(--border)"}"></div>`).join("")}</div>
    </div>
    <div style="font-size:14px;line-height:1.6">${e.text}</div>
  </div></div>`).join("")}`;
}

function addJournal(){
  const t=document.getElementById("j-text")?.value.trim();
  if(!t)return;
  const rt=parseInt(document.getElementById("j-rating")?.value||3);
  S.journal=[{id:Date.now(),date:today(),text:t,rating:rt,type:"manuel"},...S.journal];
  save();render();
}

function buildBilan(){
  const now=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  let t=`=== BILAN AUTO-THÉRAPIE BÉGAIEMENT ===\n${now}\nProfil : Blocage laryngé · Vulnérabilité démarrage\n\n`;
  t+=`--- JOURNAL (${S.journal.length} séances) ---\n`;
  S.journal.slice(0,10).forEach(e=>{t+=`[${e.date}] ${e.type||""} ${"★".repeat(e.rating)}${"☆".repeat(5-e.rating)}\n${e.text}\n\n`});
  t+=`--- MOTS DIFFICILES IDENTIFIÉS ---\n`;
  const wc={};S.recordings.forEach(r=>{if(r.words)r.words.split(",").map(w=>w.trim().toLowerCase()).filter(Boolean).forEach(w=>{wc[w]=(wc[w]||0)+1})});
  const sorted=Object.entries(wc).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)t+="Aucun enregistré.\n";
  else sorted.forEach(([w,c])=>{t+=`• ${w} — ${c} fois\n`});
  t+=`\n--- ENREGISTREMENTS (${S.recordings.length}) ---\n`;
  S.recordings.slice(0,6).forEach(e=>{t+=`[${e.date}] ${fmt(e.dur||0)} — ${e.obs||""}\n`});
  t+=`\n=== FIN — Coller dans Claude.ai pour analyse ===`;
  return t;
}
async function shareBilan(){
  const text=buildBilan();
  if(navigator.share){try{await navigator.share({title:"Bilan bégaiement",text})}catch(e){if(e.name!=="AbortError")copyBilan()}}else copyBilan();
}
function copyBilan(){
  navigator.clipboard.writeText(buildBilan()).then(()=>flashMsg("Copié !")).catch(()=>{const t=document.getElementById("bilan-ta");if(t){t.select();document.execCommand("copy");flashMsg("Copié !")}});
}
function dlBackup(){
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify({journal:S.journal,recordings:S.recordings,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"}));a.download="autotherapie-"+today().replace(/\//g,"-")+".json";a.click();
}
function importBackup(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(confirm("Importer ? Données actuelles remplacées.")){if(d.journal)S.journal=d.journal;if(d.recordings)S.recordings=d.recordings;save();render();flashMsg("Importé !")}}catch{alert("Fichier invalide.")}};r.readAsText(f);
}

function renderExport(){
  return`
  <div class="sl" style="margin-bottom:9px">Partager vers Claude</div>
  <div class="card" style="margin-bottom:12px"><div style="padding:14px">
    <p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px">Bilan journal + mots difficiles. Coller dans Claude.ai pour analyse.</p>
    <textarea id="bilan-ta" rows="6" readonly style="font-size:12px;font-family:monospace;background:var(--bg2);margin-bottom:10px">${buildBilan()}</textarea>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${navigator.share?`<button class="btn btn-blue" style="flex:1" onclick="shareBilan()">Partager</button>`:""}
      <button class="btn" style="flex:1" onclick="copyBilan()">Copier pour Claude</button>
    </div>
  </div></div>
  <div class="sl" style="margin-bottom:9px">Sauvegarde</div>
  <div class="card"><div style="padding:14px">
    <button class="btn btn-green" onclick="dlBackup()" style="margin-bottom:12px;width:100%">Télécharger la sauvegarde (.json)</button>
    <div class="sl" style="margin-bottom:6px">Restaurer</div>
    <input type="file" accept=".json" onchange="importBackup(this)" style="font-size:13px;padding:8px">
  </div></div>`;
}

function render(){
  document.getElementById("tabs").innerHTML=TABS.map(([id,label])=>`<button class="tab${S.tab===id?" active":""}${id==="home"?" tab-g":""}" onclick="S.tab='${id}';render()">${label}</button>`).join("");
  let c="";
  if(S.tab==="home")c=renderHome();
  else if(S.tab==="session")c=renderSession();
  else if(S.tab==="modules")c=renderModules();
  else if(S.tab==="recording")c=renderRecording();
  else if(S.tab==="journal")c=renderJournal();
  else if(S.tab==="export")c=renderExport();
  document.getElementById("app").innerHTML=c;
}

load();render();
</script>
