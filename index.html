<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Auto-thérapie">
<meta name="theme-color" content="#eeece8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#333330" media="(prefers-color-scheme: dark)">
<title>Auto-thérapie — Bégaiement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeece8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0ddd8;--border2:#ccc;
  --success:#1a7a3e;--success-bg:#e8f5ed;
  --warning:#a05c00;--warning-bg:#fff3e0;
  --danger:#c0392b;--danger-bg:#fdecea;
  --info:#1a5fa8;--info-bg:#e8f0fb;
  --radius:8px;--radius-lg:12px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;--text:#f0ede8;--text2:#a8a49e;--text3:#6e6a64;--border:#3a3a36;--border2:#555;--success:#4caf7a;--success-bg:#0f3320;--warning:#ffb74d;--warning-bg:#3a2200;--danger:#ef6c5a;--danger-bg:#3a0f0a;--info:#6ea8e8;--info-bg:#0d2540}
}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:15px;line-height:1.5}
.wrap{max-width:820px;margin:0 auto;padding:0 14px calc(2rem + var(--safe-bottom))}
header{background:var(--bg3);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hi{max-width:820px;margin:0 auto;padding:1rem 14px 0}
h1{font-size:17px;font-weight:600;margin-bottom:1px}
.sub{font-size:11px;color:var(--text3)}
.tabs{display:flex;overflow-x:auto;margin-top:.75rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 12px;border:none;border-bottom:2px solid transparent;background:none;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;min-height:44px;display:flex;align-items:center}
.tab.active{border-bottom-color:var(--text);color:var(--text);font-weight:500}
.card{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);overflow:hidden;margin-bottom:10px}
.ch{width:100%;padding:13px 14px;background:none;border:none;text-align:left;display:flex;align-items:center;gap:10px;cursor:pointer;font-family:inherit;color:var(--text);min-height:56px}
.ch:active{background:var(--bg2)}
.cb{padding:0 14px 14px;border-top:1px solid var(--border)}
.num{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:500}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.mt{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.mv{font-size:28px;font-weight:600;line-height:1;margin-bottom:3px}
.ml{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.pb{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:1rem}
.pf{height:100%;border-radius:3px;background:var(--success);transition:width .4s}
.sl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.tip{background:var(--info-bg);border-left:3px solid var(--info);padding:9px 11px;border-radius:0 var(--radius) var(--radius) 0;margin:8px 0 12px}
.tip p{font-size:13px;color:var(--info);line-height:1.5}
.sr{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sb{padding:6px 12px;border-radius:var(--radius);font-size:12px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;min-height:36px}
.sb.ns{background:var(--bg2);font-weight:600}
.sb.ip{background:var(--warning-bg);color:var(--warning);border-color:var(--warning);font-weight:600}
.sb.ma{background:var(--success-bg);color:var(--success);border-color:var(--success);font-weight:600}
textarea,select,input[type=text]{font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);width:100%;padding:9px 11px;font-size:15px;-webkit-appearance:none;appearance:none}
textarea{resize:vertical;line-height:1.5}
textarea:focus,select:focus,input:focus{outline:2px solid var(--info);outline-offset:-1px}
.btn{padding:10px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;min-height:44px;-webkit-appearance:none}
.btn:active{opacity:.75}
.btn-primary{background:var(--info-bg);color:var(--info);border-color:var(--info)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.btn-success{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.btn-export{background:var(--bg2);color:var(--text);border:1px solid var(--border2);width:100%;justify-content:center;font-size:14px}
.btn-sm{padding:6px 12px;font-size:12px;min-height:34px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.ei{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px}
.en{width:20px;height:20px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0;margin-top:2px}
.mc{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg);margin-bottom:10px;overflow:hidden}
.mh{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;width:100%;background:none;border:none;text-align:left;font-family:inherit;color:var(--text);min-height:56px}
.mh:active{background:var(--bg2)}
.mi{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ec{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:9px}
.tc{width:60px;height:60px;border-radius:50%;border:2.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0;transition:all .3s}
.tc.run{border-color:var(--success);color:var(--success)}
.tc.done{border-color:var(--success);background:var(--success-bg);color:var(--success)}
.pr{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px}
.dl{width:66px;font-size:13px;font-weight:500;flex-shrink:0}
.je{padding:13px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.wt{display:inline-block;background:var(--danger-bg);color:var(--danger);font-size:12px;padding:3px 9px;border-radius:12px;margin:2px 3px 0 0}
.rw{display:flex;align-items:center;gap:3px;height:28px}
.rw span{display:block;width:3px;background:var(--danger);border-radius:2px;animation:wave .8s ease-in-out infinite}
.rw span:nth-child(2){animation-delay:.12s}.rw span:nth-child(3){animation-delay:.24s}.rw span:nth-child(4){animation-delay:.36s}.rw span:nth-child(5){animation-delay:.48s}
@keyframes wave{0%,100%{height:6px}50%{height:22px}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}
.rs{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.ib{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-top:1rem}
.sm{font-size:11px;color:var(--text3);margin-top:2px}
audio{width:100%;margin-bottom:8px}
.sb-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:5px}
.sb-fill{height:100%;border-radius:2px;transition:width .4s}
.warn-box{background:var(--warning-bg);border:1px solid var(--warning);border-radius:var(--radius);padding:10px 12px;margin-bottom:1rem}
.warn-box p{font-size:13px;color:var(--warning);line-height:1.5}
.del-btn{padding:4px 10px;font-size:11px;border:1px solid var(--danger);color:var(--danger);background:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;min-height:30px;flex-shrink:0}
.del-btn:active{background:var(--danger-bg)}
.pl{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:12px;color:var(--text2)}
.export-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:1rem}
.export-ta{font-size:12px;line-height:1.6;font-family:var(--font-mono,monospace);height:220px;background:var(--bg2)}
.copy-done{background:var(--success-bg)!important;color:var(--success)!important;border-color:var(--success)!important}
.section{margin-bottom:1.25rem}
.pwa-hint{background:var(--info-bg);border:1px solid var(--info);border-radius:var(--radius);padding:10px 12px;margin-bottom:1rem;font-size:13px;color:var(--info);line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="hi">
    <h1>Auto-thérapie — Bégaiement</h1>
    <div class="sub">Programme Malcolm Fraser</div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<div class="wrap" style="padding-top:1rem"><div id="content"></div></div>

<script>
const RULES=[
  {id:"exp",num:"0",title:"Thérapie expérimentale",subtitle:"Parole lente, amorces douces",phase:"Préliminaire",description:"Parlez très lentement (≈30 mots/min). Prendre ≥1 seconde pour glisser sur le premier son de chaque mot. Prolonger toutes les consonnes et voyelles avec contacts légers. Phonation continue.",tip:"Technique provisoire — démontre que le contrôle est possible. Pratiquer quelques semaines avant de passer aux règles.",exercises:["Lire un texte à voix haute en ralentissant progressivement","Amorces douces sur plosives : p, b, t, d, k","Étirer chaque consonne et voyelle — fusion des sons sans rupture","Appliquer dans une vraie conversation","Augmenter le débit progressivement une fois maîtrisé"],eq:["Miroir","Enregistreur"]},
  {id:"r1",num:"1",title:"Règle 1",subtitle:"Parlez lentement",phase:"Réduction de la tension",description:"Prendre l'habitude de parler lentement que vous bégayiez ou non. Pauses courtes et fréquentes. Résister à la pression du temps.",tip:"Objectif progressif : 1 → 2 → 3 → 5 interlocuteurs consécutifs avec débit lent.",exercises:["5-10 min/jour de lecture — débit décroissant","Pause délibérée avant de répondre au téléphone","Résister à l'urgence de parler vite","S'enregistrer et réécouter pour vérifier le débit"],eq:["Enregistreur","Cahier"]},
  {id:"r2",num:"2",title:"Règle 2",subtitle:"Bégayez plus facilement",phase:"Réduction de la tension",description:"Bégayer calmement, sans effort, avec amorces douces. Prolonger le premier son des mots craints et la transition au son suivant. Mouvements relâchés.",tip:"Ne pas forcer la fluence — glisser doucement sur les sons.",exercises:["Lecture avec mouvements relâchés","Contacts légers sur plosives — lèvres s'effleurant à peine","Prolonger son initial des mots craints + transition","Aide-mémoire : bracelet ou note"],eq:["Aide-mémoire","Cahier"]},
  {id:"r3",num:"3",title:"Règle 3",subtitle:"Admettez que vous bégayez",phase:"Désensibilisation",description:"Cesser de cacher. Admettre ouvertement. Pratiquer le bégaiement volontaire sur des mots non craints.",tip:"Le bégaiement volontaire doit être doux — pas une imitation des pires blocages.",exercises:["Dire à un proche : 'Je bégaie et j'y travaille'","Bégaiement volontaire seul (répétitions douces)","Transférer en conversation","Aller en magasin et bégayer volontairement"],eq:["Miroir"]},
  {id:"r4",num:"4",title:"Règle 4",subtitle:"Éliminez les symptômes secondaires",phase:"Comportements inadaptés",description:"Identifier et éliminer les mouvements corporels superflus : clignements, grimaces, mouvements de tête, tapements, etc.",tip:"Un seul symptôme à la fois. Rendre involontaire → volontaire → éliminer.",exercises:["Observer dans un miroir pendant appels","Demander à un proche de noter les symptômes","Faire volontairement le symptôme sans parler","Varier consciemment le symptôme"],eq:["Miroir","Vidéo","Cahier"]},
  {id:"r5",num:"5",title:"Règle 5",subtitle:"Éliminez les évitements",phase:"Comportements inadaptés",description:"Cesser évitements, procrastinations, substitutions. Ne plus fuir les mots difficiles, les situations craintes, le téléphone.",tip:"Chaque évitement renforce la peur. Mieux vaut bégayer 5 min que d'éviter le mot.",exercises:["Inventaire des évitements dans le cahier","Affronter une situation crainte par jour","Utiliser exactement les mots difficiles","Répéter le mot évité en punition"],eq:["Cahier"]},
  {id:"r6",num:"6",title:"Règle 6",subtitle:"Maintenez le contact visuel",phase:"Comportements inadaptés",description:"Contact visuel naturel pendant toutes les conversations, surtout pendant les blocages.",tip:"Établir le contact 2-3 secondes AVANT de commencer à parler.",exercises:["Miroir : bloquer en maintenant le regard","5 appels téléphoniques face au miroir","Noter la couleur des yeux de 10 personnes"],eq:["Miroir","Cahier"]},
  {id:"r7",num:"7",title:"Règle 7",subtitle:"Analysez vos blocages",phase:"Analyse et correction",description:"Identifier les mouvements musculaires inadaptés lors des blocages. Comparer avec la parole fluide.",tip:"La plupart des blocages viennent d'un contact trop serré. Contact léger = solution principale.",exercises:["Bégayer très lentement pour ressentir les actions musculaires","Observer dans un miroir pendant appels","Enregistrer 5-10 min, réécouter en mimant","Comparer le même son avec et sans bégaiement"],eq:["Miroir","Enregistreur","Cahier"]},
  {id:"r8",num:"8",title:"Règle 8",subtitle:"Corrections des blocages",phase:"Analyse et correction",description:"3 corrections dans l'ordre : Annulation → Pendant le blocage → Pré-blocage.",tip:"Respecter l'ordre : annulation d'abord, puis pendant, puis pré.",exercises:["ANNULATION : compléter → pause → relâchement → analyser → redire lentement","PENDANT : ralentir le blocage → prolonger → se libérer","PRÉ : pause → relâchement → rappel erreur → répétition mentale → dire corrigé"],eq:["Miroir","Cahier"]},
  {id:"r9",num:"9",title:"Règle 9",subtitle:"Ne revenez jamais en arrière",phase:"Contrôle du débit",description:"Maintenir phonation et débit d'air continus. Ne jamais répéter ni reculer involontairement.",exercises:["Identifier les répétitions involontaires à l'écoute","Amorce douce + prolongation + transition continue","Maintenir la phonation pendant les difficultés"],eq:["Enregistreur"]},
  {id:"r10",num:"10",title:"Règle 10",subtitle:"Parlez avec intonation",phase:"Qualité de l'élocution",description:"Voix mélodieuse, ferme, naturelle. Varier débit et volume.",tip:"Variation + débit continu = parole détendue.",exercises:["Lire en variant l'intonation","Identifier les passages monotones à l'écoute","Varier volume et débit sur phrases ordinaires"],eq:["Enregistreur"]},
  {id:"r11",num:"11",title:"Règle 11",subtitle:"Portez attention à votre fluence",phase:"Renforcement positif",description:"Reconnaître et mémoriser les moments de parole fluide. Visualisation pour augmenter la confiance.",tip:"La fluence existe déjà en vous — vous parlez sans problème seul ou en chantant.",exercises:["Noter les conversations réussies","Parler seul devant un miroir","Visualisation : revivre une situation réussie"],eq:["Cahier","Miroir"]},
  {id:"r12",num:"12",title:"Règle 12",subtitle:"Parlez aussi souvent que possible",phase:"Pratique intensive",description:"Maximiser les occasions de parole. Corrélation directe entre temps de parole et fluence.",tip:"Parlez à saturation. — Gerald F. Johnson",exercises:["Créer chaque jour une occasion légèrement difficile","Utiliser le téléphone activement","Prendre la parole quand l'occasion se présente"],eq:[]}
];
const MUSCLES=[
  {id:"resp",icon:"🫁",name:"Système respiratoire",muscles:"Diaphragme · intercostaux · abdominaux",bg:"#e8f5ed",tc:"#1a7a3e",exercises:[
    {name:"Respiration diaphragmatique",dur:60,desc:"Inspirer 4s (ventre sort) → expirer 6s sur 'sss' continu.",note:"Le souffle vient du ventre — support de la parole."},
    {name:"Contrôle du flux d'air",dur:45,desc:"Expirer sur 'mmm' continu et régulier. Volume constant.",note:"Base de l'amorce douce (règle 2)."},
    {name:"Soupir laryngé relâché",dur:30,desc:"Inspirer doucement → soupir 'aaah' très relâché.",note:"État laryngé cible avant un mot craint."}
  ]},
  {id:"phon",icon:"🎤",name:"Système phonatoire",muscles:"Thyro-aryténoïdien · crico-thyroïdien · crico-aryténoïdien",bg:"#ede8fb",tc:"#5344b5",exercises:[
    {name:"Onset doux — amorce vocale",dur:45,desc:"'aaa', 'eee', 'iii' démarrés du silence. Aucun coup de glotte.",note:"Exactement l'amorce douce de la règle 2."},
    {name:"Bourdonnement laryngé",dur:45,desc:"'mmm' puis 'nnn' à intensité constante.",note:"Larynx détendu = son régulier. Tension = son haché."},
    {name:"Glissades vocales",dur:30,desc:"Glisser grave → aigu → grave sur 'aaah'. Aucune cassure.",note:"Une cassure = hypercontraction laryngée."}
  ]},
  {id:"vel",icon:"🔊",name:"Système vélaire",muscles:"Élévateur du voile · tenseur du voile",bg:"#fff3e0",tc:"#a05c00",exercises:[
    {name:"Alternance nasale / orale",dur:40,desc:"'mmm' → 'aaa' → 'nnn' → 'ooo'. Sentir le voile monter et descendre.",note:"Voile tendu = voix nasillarde."},
    {name:"Sons contrastés",dur:30,desc:"Enchaîner lentement : 'ma-na-ba-da'.",note:"Appliquer sur vos mots difficiles habituels."}
  ]},
  {id:"ling",icon:"👅",name:"Système lingual",muscles:"Génio-glosse · hyo-glosse · stylo-glosse · palato-glosse",bg:"#fdecea",tc:"#c0392b",exercises:[
    {name:"Mobilisation complète",dur:40,desc:"Langue : sortir → rentrer → gauche → droite → palais → relâcher. 5 cycles.",note:"Langue détendue = condition de fluidité."},
    {name:"Contacts légers alvéolaires",dur:45,desc:"'t-d-t-d' et 'l-l-l' avec contacts extrêmement légers.",note:"Contact léger = suppression de la pression excessive."},
    {name:"Prolongation des liquides",dur:40,desc:"'lllll' → 'rrrrr' → 'nnnnn' très lentement.",note:"Conscience proprioceptive de la position linguale."}
  ]},
  {id:"lab",icon:"👄",name:"Système labial / mandibulaire",muscles:"Orbiculaire · zygomatiques · masséter · ptérygoïdiens",bg:"#fdeef5",tc:"#9c2462",exercises:[
    {name:"Relaxation mandibulaire",dur:40,desc:"Ouvrir au max → fermer 5 fois. Puis laisser la mâchoire tomber par gravité.",note:"Mâchoire relâchée = point de départ de l'annulation."},
    {name:"Contacts labiaux feather-light",dur:45,desc:"'p-b-p-b-m-m-m' avec contacts labiaux à peine perceptibles.",note:"Supprime le blocage labial sur 'p' et 'b'."},
    {name:"Décontraction du masséter",dur:35,desc:"Mâcher lentement de façon exagérée, puis parler dans cet état.",note:"Cible l'hypertonique sur 'b', 'p', 'm'."}
  ]}
];
const DAYS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const TABS=[["dashboard","Tableau de bord"],["warmup","Échauffement"],["recording","Enregistrement"],["rules","Règles"],["planning","Planning"],["journal","Journal"],["export","→ Claude"]];
const KEY="sbt_v2";
const MAX_RECS=15;

let S={tab:"dashboard",statuses:{},notes:{},journal:[],weekPlan:{},recordings:[],expanded:null,muscleExpanded:null};
let recorder=null,audioChunks=[],isRecording=false,recTimer=null,recSeconds=0,timers={};

function load(){try{const d=localStorage.getItem(KEY);if(d)Object.assign(S,JSON.parse(d))}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify({statuses:S.statuses,notes:S.notes,journal:S.journal,weekPlan:S.weekPlan,recordings:S.recordings}))}catch(e){alert("Stockage plein. Supprimez des enregistrements anciens.");}}
function storUsed(){try{const d=localStorage.getItem(KEY);return d?d.length*2:0}catch(e){return 0}}
function fmtSz(b){if(b<1024)return b+"o";if(b<1048576)return Math.round(b/1024)+"Ko";return(b/1048576).toFixed(1)+"Mo"}
function fmt(s){const m=Math.floor(s/60),sc=s%60;return m+":"+(sc<10?"0":"")+sc}
function si(st){
  if(st==="mastered")return{label:"Maîtrisée",c:"var(--success)",bg:"var(--success-bg)"};
  if(st==="in_progress")return{label:"En cours",c:"var(--warning)",bg:"var(--warning-bg)"};
  return{label:"Non commencée",c:"var(--text3)",bg:"var(--bg2)"};
}
function ns(st){
  if(st==="mastered")return{bg:"var(--success-bg)",c:"var(--success)"};
  if(st==="in_progress")return{bg:"var(--warning-bg)",c:"var(--warning)"};
  return{bg:"var(--bg2)",c:"var(--text3)"};
}
function setStatus(id,s){S.statuses[id]=s;save();render()}
function toggleExpand(id){S.expanded=S.expanded===id?null:id;render()}
function toggleMuscle(id){S.muscleExpanded=S.muscleExpanded===id?null:id;render()}
function setTab(t){S.tab=t;render()}
function deleteRec(id){if(!confirm("Supprimer cet enregistrement ?"))return;S.recordings=S.recordings.filter(r=>r.id!==id);save();render()}

function startTimer(eid,sec){
  if(timers[eid]){clearInterval(timers[eid]);delete timers[eid]}
  let rem=sec;
  const tick=()=>{
    const el=document.getElementById("tc-"+eid),btn=document.getElementById("tb-"+eid);
    if(!el)return;
    if(rem<=0){clearInterval(timers[eid]);delete timers[eid];el.textContent="✓";el.className="tc done";if(btn){btn.textContent="Terminé";btn.disabled=true}}
    else{el.textContent=rem+"s";el.className="tc run";rem--}
  };
  tick();timers[eid]=setInterval(tick,1000);
  const btn=document.getElementById("tb-"+eid);if(btn){btn.textContent="En cours…";btn.disabled=true}
}

function blobToB64(blob){return new Promise(res=>{const r=new FileReader();r.onloadend=()=>res(r.result);r.readAsDataURL(blob)})}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    const mt=MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":
              MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":
              MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":"audio/ogg";
    recorder=new MediaRecorder(stream,{mimeType:mt});
    recorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};
    recorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(audioChunks,{type:recorder.mimeType});
      const b64=await blobToB64(blob);
      window._lastRec={b64,dur:recSeconds};
      isRecording=false;render();
    };
    recorder.start(1000);
    isRecording=true;recSeconds=0;
    recTimer=setInterval(()=>{recSeconds++;const el=document.getElementById("rec-timer");if(el)el.textContent=fmt(recSeconds)},1000);
    render();
  }catch(e){
    let msg="Microphone inaccessible.\n\n"+e.message;
    if(location.protocol==="file:")msg+="\n\nSolution : hébergez ce fichier sur Netlify (instructions dans l'onglet → Claude) ou ouvrez-le dans Firefox.";
    else msg+="\n\nVérifiez les permissions microphone dans les réglages de votre navigateur.";
    alert(msg);
  }
}
function stopRecording(){if(recorder&&recorder.state!=="inactive")recorder.stop();clearInterval(recTimer)}
async function saveRecording(){
  if(!window._lastRec)return;
  if(S.recordings.length>=MAX_RECS){alert("Maximum "+MAX_RECS+" enregistrements. Supprimez-en un d'abord.");return}
  const rule=document.getElementById("rec-rule")?.value||"r1";
  const obs=document.getElementById("rec-obs")?.value||"";
  const words=document.getElementById("rec-words")?.value||"";
  S.recordings=[{id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),rule,obs,words,dur:window._lastRec.dur,b64:window._lastRec.b64},...S.recordings];
  try{save()}catch(e){S.recordings.shift();return}
  window._lastRec=null;render();
}
function addJournalEntry(){
  const t=document.getElementById("j-text"),r=document.getElementById("j-rule"),rt=parseInt(document.getElementById("j-rating")?.value||3);
  if(!t?.value.trim())return;
  S.journal=[{id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),rule:r?.value||"r1",text:t.value,rating:rt},...S.journal];
  save();t.value="";render();
}

function buildExportText(){
  const now=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  let txt="=== BILAN AUTO-THÉRAPIE BÉGAIEMENT ===\n";
  txt+="Exporté le "+now+"\n\n";

  // Progression règles
  txt+="--- PROGRESSION SUR LES RÈGLES ---\n";
  RULES.forEach(r=>{
    const st=S.statuses[r.id]||"not_started";
    const lbl=st==="mastered"?"✅ Maîtrisée":st==="in_progress"?"🔄 En cours":"⬜ Non commencée";
    txt+=`Règle ${r.num} — ${r.subtitle} : ${lbl}\n`;
  });
  const mastered=RULES.filter(r=>S.statuses[r.id]==="mastered").length;
  const inProg=RULES.filter(r=>S.statuses[r.id]==="in_progress").length;
  txt+=`\nTotal : ${mastered} maîtrisées, ${inProg} en cours, ${RULES.length-mastered-inProg} non commencées\n\n`;

  // Mots difficiles avec fréquence
  txt+="--- MOTS SUR LESQUELS JE BUTE (fréquence) ---\n";
  const wordCount={};
  S.recordings.forEach(rec=>{
    if(rec.words){rec.words.split(",").map(w=>w.trim().toLowerCase()).filter(Boolean).forEach(w=>{wordCount[w]=(wordCount[w]||0)+1})}
  });
  const sorted=Object.entries(wordCount).sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0){txt+="Aucun mot enregistré pour l'instant.\n"}
  else{sorted.forEach(([w,c])=>{txt+=`• ${w} — ${c} occurrence(s)\n`})}
  txt+="\n";

  // Observations des séances
  txt+="--- OBSERVATIONS DE SÉANCES ("+S.recordings.length+" enregistrements) ---\n";
  if(S.recordings.length===0){txt+="Aucun enregistrement pour l'instant.\n"}
  else{
    S.recordings.slice(0,10).forEach(e=>{
      const rule=RULES.find(r=>r.id===e.rule);
      txt+=`\n[${e.date} ${e.time}] ${rule?rule.subtitle:"—"} (${fmt(e.dur||0)})\n`;
      if(e.words)txt+=`Mots difficiles : ${e.words}\n`;
      if(e.obs)txt+=`Observations : ${e.obs}\n`;
    });
  }
  txt+="\n";

  // Journal
  txt+="--- JOURNAL DE PRATIQUE ("+S.journal.length+" entrées) ---\n";
  if(S.journal.length===0){txt+="Aucune entrée de journal.\n"}
  else{
    S.journal.slice(0,10).forEach(e=>{
      const rule=RULES.find(r=>r.id===e.rule);
      const stars="★".repeat(e.rating)+"☆".repeat(5-e.rating);
      txt+=`\n[${e.date}] ${rule?rule.subtitle:"—"} ${stars}\n${e.text}\n`;
    });
  }
  txt+="\n";

  // Notes personnelles non vides
  const notedRules=RULES.filter(r=>S.notes[r.id]&&S.notes[r.id].trim());
  if(notedRules.length>0){
    txt+="--- NOTES PERSONNELLES PAR RÈGLE ---\n";
    notedRules.forEach(r=>{txt+=`\nRègle ${r.num} — ${r.subtitle} :\n${S.notes[r.id]}\n`});
    txt+="\n";
  }

  txt+="=== FIN DU BILAN ===\n";
  txt+="Collez ce texte dans Claude.ai et demandez une analyse de votre progression.";
  return txt;
}

function copyExport(){
  const ta=document.getElementById("export-ta");
  if(!ta)return;
  navigator.clipboard.writeText(ta.value).then(()=>{
    const btn=document.getElementById("copy-btn");
    if(btn){btn.textContent="✓ Copié !";btn.classList.add("copy-done");setTimeout(()=>{btn.textContent="Copier pour Claude";btn.classList.remove("copy-done")},2500)}
  }).catch(()=>{ta.select();document.execCommand("copy")});
}

function renderStorBar(){
  const used=storUsed(),max=5*1024*1024,pct=Math.min(100,Math.round((used/max)*100));

  return`<div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:1rem">
    <div class="pl"><span>Stockage local utilisé</span><span style="font-weight:500">${fmtSz(used)} / ~5 Mo</span></div>
    <div class="sb-bar"><div class="sb-fill" style="width:${pct}%;background:${c}"></div></div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">${S.recordings.length}/${MAX_RECS} enregistrements · persistants entre sessions</div>

}

  return`<p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem">Avant chaque séance, travaillez les cinq systèmes dans l'ordre. Chaque exercice intègre une composante vocale.</p>
  ${MUSCLES.map(m=>{const isOpen=S.muscleExpanded===m.id;return`<div class="mc"><button class="mh" onclick="toggleMuscle('${m.id}')"><div class="mi" style="background:${m.bg}">${m.icon}</div><div style="flex:1"><div style="font-size:14px;font-weight:500">${m.name}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${m.muscles}</div></div><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="transform:${isOpen?"rotate(180deg)":"rotate(0)"};transition:transform .2s;flex-shrink:0"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>${isOpen?`<div class="cb"><div style="padding-top:12px">${m.exercises.map((ex,i)=>{const eid=m.id+"-"+i;return`<div class="ec"><div style="display:flex;align-items:flex-start;gap:11px;margin-bottom:9px"><div class="tc" id="tc-${eid}" style="color:${m.tc};border-color:${m.bg}">${ex.dur}s</div><div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:4px">${ex.name}</div><p style="font-size:13px;color:var(--text2);line-height:1.5">${ex.desc}</p></div></div><div class="tip" style="background:${m.bg};border-left-color:${m.tc};margin-bottom:9px"><p style="color:${m.tc}">Lien parole : ${ex.note}</p></div><button id="tb-${eid}" class="btn btn-sm" onclick="startTimer('${eid}',${ex.dur})">Démarrer ${ex.dur}s</button></div>`;}).join("")}</div></div>`:""}`;}).join("")}`;

function renderRecording(){
  const recs=S.recordings;
  const usedPct=Math.min(100,Math.round((storUsed()/(5*1024*1024))*100));
  return`
  ${usedPct>75?`<div class="warn-box"><p>Stockage à ${usedPct}%. Supprimez des enregistrements pour libérer de l'espace.</p></div>`:""}
  <div class="card" style="margin-bottom:1rem"><div style="padding:15px">
    <div class="sl" style="margin-bottom:10px">Enregistrer une séance</div>
    ${!isRecording&&!window._lastRec?`
    <div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.6">
      L'audio sera sauvegardé dans ce navigateur et persistera entre les sessions.<br>
      <strong style="color:var(--text)">iOS :</strong> fonctionne uniquement via Safari (fichier hébergé sur Netlify).<br>
      <strong style="color:var(--text)">Android :</strong> Chrome ou Firefox.<br>
      <strong style="color:var(--text)">Desktop :</strong> Firefox recommandé pour les fichiers locaux.
    </div>

    ${isRecording?`<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><div class="rw"><span></span><span></span><span></span><span></span><span></span></div><span id="rec-timer" style="font-size:24px;font-weight:600;color:var(--danger)">0:00</span></div><button class="btn" onclick="stopRecording()">Arrêter</button>`:""}
    ${!isRecording&&window._lastRec?`
    <div style="margin-bottom:11px"><div class="sl" style="margin-bottom:5px">Réécoute — ${fmt(window._lastRec.dur)}</div><audio controls src="${window._lastRec.b64}"></audio></div>
    <div style="margin-bottom:10px"><div class="sl" style="margin-bottom:5px">Règle travaillée</div><select id="rec-rule">${RULES.map(r=>`<option value="${r.id}">${r.title} — ${r.subtitle}</option>`).join("")}</select></div>
    <div style="margin-bottom:10px"><div class="sl" style="margin-bottom:5px">Mots sur lesquels j'ai buté</div><input type="text" id="rec-words" placeholder="bonjour, Pierre, téléphone… (virgules)"></div>
    <div style="margin-bottom:12px"><div class="sl" style="margin-bottom:5px">Observations après réécoute</div><textarea id="rec-obs" rows="3" placeholder="Débit ? Blocages ? Symptômes secondaires ? Points positifs ?"></textarea></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-success" onclick="saveRecording()">Sauvegarder</button><button class="btn" onclick="window._lastRec=null;render()">Annuler</button></div>`:""}
  </div></div>

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px"><div><span style="font-size:14px;font-weight:500">${rule?rule.subtitle:"—"}</span><div class="sm">${e.date} ${e.time} · ${fmt(e.dur||0)}</div></div><button class="del-btn" onclick="deleteRec(${e.id})">Supprimer</button></div>

    <audio controls src="${e.b64}"></audio>
  </div>`;}).join("")}`}`;
}

function renderRules(){
  return RULES.map(r=>{

function renderJournal(){
  return`<div class="card" style="margin-bottom:1rem"><div style="padding:14px"><div class="sl" style="margin-bottom:9px">Nouvelle entrée</div><div style="display:flex;gap:9px;margin-bottom:9px;flex-wrap:wrap;align-items:center"><select id="j-rule" style="flex:1;min-width:180px">${RULES.map(r=>`<option value="${r.id}">${r.title} — ${r.subtitle}</option>`).join("")}</select><div style="display:flex;align-items:center;gap:6px;flex-shrink:0"><span style="font-size:12px;color:var(--text2)">Note :</span><select id="j-rating" style="width:auto;padding:9px 10px">${[1,2,3,4,5].map(i=>`<option value="${i}"${i===3?" selected":""}>${i}/5</option>`).join("")}</select></div></div><textarea id="j-text" rows="4" placeholder="Vos observations après la séance…"></textarea><button class="btn btn-primary" onclick="addJournalEntry()" style="margin-top:9px">Enregistrer</button></div></div>

function render(){
  document.getElementById("tabs").innerHTML=TABS.map(([id,label])=>`<button class="tab${S.tab===id?" active":""}" onclick="setTab('${id}')">${label}</button>`).join("");
  let c="";
  if(S.tab==="dashboard")c=renderDashboard();
  else if(S.tab==="warmup")c=renderWarmup();
  else if(S.tab==="recording")c=renderRecording();
  else if(S.tab==="rules")c=renderRules();
  else if(S.tab==="planning")c=renderPlanning();
  else if(S.tab==="journal")c=renderJournal();
  else if(S.tab==="export")c=renderExport();
  document.getElementById("content").innerHTML=c;
}
