<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Auto-thérapie">
<meta name="theme-color" content="#f0ede8">
<title>Auto-thérapie Bégaiement</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f5f2;--bg3:#f0ede8;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#999;
  --border:#e2ddd8;
  --green:#1a7a3e;--green-bg:#e8f5ed;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --orange:#a05c00;--orange-bg:#fff3e0;
  --red:#c0392b;--red-bg:#fdecea;
  --purple:#5344b5;--purple-bg:#ede8fb;
  --pink:#9c2462;--pink-bg:#fdeef5;
  --r:8px;--rl:14px;
  --safe:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2b;--text:#f0ede8;--text2:#a8a49e;--text3:#666;--border:#3a3836;
  --green:#4caf7a;--green-bg:#0d2e1a;--blue:#6ea8e8;--blue-bg:#0d2540;
  --orange:#ffb74d;--orange-bg:#2e1a00;--red:#ef6c5a;--red-bg:#2e0e08;
  --purple:#9b8fe0;--purple-bg:#1e1940;--pink:#d47ab0;--pink-bg:#2e0e20;
}}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:15px;line-height:1.5}
.wrap{max-width:780px;margin:0 auto;padding:1rem 14px calc(2.5rem + var(--safe))}
header{background:var(--bg3);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hi{max-width:780px;margin:0 auto;padding:.9rem 14px 0}
h1{font-size:16px;font-weight:600}
.sub{font-size:11px;color:var(--text3);margin-top:1px}
.tabs{display:flex;overflow-x:auto;margin-top:.7rem;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border:none;border-bottom:2px solid transparent;background:none;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;min-height:42px}
.tab.active{border-bottom-color:var(--text);color:var(--text);font-weight:500}
.tab-s{color:var(--green)!important}.tab-s.active{border-bottom-color:var(--green)!important}
/* cards */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.ch{width:100%;padding:13px 14px;background:none;border:none;text-align:left;display:flex;align-items:center;gap:10px;cursor:pointer;font-family:inherit;color:var(--text);min-height:54px}
.ch:active{background:var(--bg2)}
.cb{padding:14px;border-top:1px solid var(--border)}
/* typography */
.sl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.note{background:var(--blue-bg);border-left:3px solid var(--blue);padding:9px 11px;border-radius:0 var(--r) var(--r) 0;margin:8px 0 12px;font-size:13px;color:var(--blue);line-height:1.5}
.warn{background:var(--orange-bg);border-left:3px solid var(--orange);padding:9px 11px;border-radius:0 var(--r) var(--r) 0;margin:8px 0;font-size:13px;color:var(--orange);line-height:1.5}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;min-height:42px;text-decoration:none;-webkit-appearance:none}
.btn:active{opacity:.7}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 11px;font-size:12px;min-height:32px}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
.btn-start{background:var(--green);color:#fff;border-color:var(--green);font-size:16px;font-weight:600;padding:14px;width:100%;justify-content:center;border-radius:var(--rl)}
.btn-yt{background:#f00;color:#fff;border-color:#c00}
/* forms */
input,textarea,select{font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;font-size:15px;-webkit-appearance:none;width:100%}
input:focus,textarea:focus,select:focus{outline:2px solid var(--blue);outline-offset:-1px}
textarea{resize:vertical;line-height:1.5}
/* timer */
.timer-ring{width:56px;height:56px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;transition:all .3s}
.timer-ring.running{border-color:var(--green);color:var(--green)}
.timer-ring.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
/* video */
.vid-box{border-radius:var(--r);overflow:hidden;background:#000;position:relative;padding-top:56.25%;margin:10px 0}
.vid-box iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
/* session */
.prog-bar{display:flex;gap:4px;margin-bottom:1rem}
.prog-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.prog-dot.done{background:var(--green)}.prog-dot.cur{background:var(--orange)}
/* module header */
.mod-head{border-radius:var(--rl);padding:16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:14px}
/* step */
.step{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.step.done-step{opacity:.55}
.check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px;transition:all .2s;background:none}
.check.on{background:var(--green);border-color:var(--green);color:#fff}
/* words */
.word-chip{display:inline-block;padding:5px 13px;border-radius:20px;font-size:14px;font-weight:500;margin:4px;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange)}
.phrase-chip{display:block;padding:9px 13px;border-radius:var(--r);font-size:14px;margin-bottom:7px;background:var(--bg2);border-left:3px solid var(--orange);line-height:1.5}
/* recording */
.wave{display:flex;align-items:center;gap:3px;height:26px}
.wave span{display:block;width:3px;background:var(--red);border-radius:2px;animation:wv .8s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.12s}.wave span:nth-child(3){animation-delay:.24s}.wave span:nth-child(4){animation-delay:.36s}.wave span:nth-child(5){animation-delay:.48s}
@keyframes wv{0%,100%{height:5px}50%{height:20px}}
/* misc */
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px}
.dot{width:8px;height:8px;border-radius:50%}
.del-btn{font-size:11px;padding:4px 9px;border:1px solid var(--red);color:var(--red);background:none;border-radius:var(--r);cursor:pointer;flex-shrink:0;font-family:inherit}
.storage-bar{height:4px;border-radius:2px;overflow:hidden;background:var(--bg2);margin-top:4px}
.storage-fill{height:100%;border-radius:2px;transition:width .4s}
audio{width:100%;margin:6px 0}
svg.illus{overflow:visible}
.p14{padding:14px}.flx1{flex:1}.sub2{font-size:11px;color:var(--text3)}.desc2{font-size:13px;color:var(--text2)}
</style>
</head>

// RANDOM WORDS (seeded daily)─────────────────────────────────────────────
function dailySeed(){
  const s=new Date().toDateString();let h=0;
  for(let c of s)h=((h<<5)-h)+c.charCodeAt(0);
  return h>>>0;
}
function seededPick(arr,n,seed){
  let h=seed;const pick=(max)=>{h=(h*1664525+1013904223)>>>0;return h%max};
  const pool=[...arr],res=[];
  while(res.length<n&&pool.length>0){const i=pick(pool.length);res.push(pool.splice(i,1)[0])}
  return res;
}
function getDailyWords(){
  const offset=(S.sessionCount||0)*100;
  const s=dailySeed()+offset;
  return{
    plosives:seededPick(BV_MOTS_PLOSIVES,5,s),
    fricat:seededPick(BV_MOTS_FRICAT,4,s+1),
    voyelles:seededPick(BV_MOTS_VOYELLES,3,s+2),
    phrases:seededPick(BV_PHRASES,5,s+3),
    topic:seededPick(TOPICS,1,s+4)[0]
  };
}

      if(btn()){btn().textContent="Terminé";btn().disabled=true}

function b64(blob){return new Promise(r=>{const fr=new FileReader();fr.onloadend=()=>r(fr.result);fr.readAsDataURL(blob)})}
async function startRec(fromSession){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    chunks=[];
    const mt=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg"].find(t=>MediaRecorder.isTypeSupported(t));
    recorder=new MediaRecorder(stream,{mimeType:mt});
    recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    recorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:recorder.mimeType});
      window._rec={b64:await b64(blob),dur:recSecs,fromSession:!!fromSession};
      isRec=false;render();
    };
    recorder.start(1000);isRec=true;recSecs=0;
    recTimer=setInterval(()=>{recSecs++;const el=document.getElementById("rec-time");if(el)el.textContent=fmt(recSecs)},1000);
    render();
  }catch(e){alert("Microphone inaccessible.\n"+e.message)}
}

function getStats(){
  const wc={};
  S.recordings.forEach(r=>{if(r.words)r.words.split(",").map(w=>w.trim().toLowerCase()).filter(Boolean).forEach(w=>{wc[w]=(wc[w]||0)+1})});
  const sortedWords=Object.entries(wc).sort((a,b)=>b[1]-a[1]);
  const modCount={};
  S.recordings.forEach(r=>{modCount[r.module]=(modCount[r.module]||0)+1});
  let streak=0;
  const dates=[...new Set(S.journal.map(j=>j.date))].sort((a,b)=>{
    const[da,ma,ya]=a.split("/").map(Number);const[db,mb,yb]=b.split("/").map(Number);
    return new Date(yb,mb-1,db)-new Date(ya,ma-1,da);
  });
  if(dates.length){
    let d=new Date();d.setHours(0,0,0,0);
    for(const ds of dates){
      const[dd,mm,yy]=ds.split("/").map(Number);
      const cd=new Date(yy,mm-1,dd);cd.setHours(0,0,0,0);
      const diff=Math.round((d-cd)/(86400000));
      if(diff<=1){streak++;d=cd}else break;
    }
  }
  const now=new Date();
  const avgFor=(days)=>{
    const cutoff=new Date(now-days*86400000);
    const entries=S.journal.filter(j=>{const[d,m,y]=j.date.split("/").map(Number);return new Date(y,m-1,d)>=cutoff});
    if(!entries.length)return null;
    return(entries.reduce((a,e)=>a+e.rating,0)/entries.length).toFixed(1);
  };
  return{sortedWords,modCount,streak,totalSessions:S.journal.length,avg7:avgFor(7),avg14:avgFor(14),avg30:avgFor(30)};
}

  if(missing.length)t+=`⚠️ Modules sans enregistrement : ${missing.map(m=>modNames[m]).join(", ")}\n`;
  t+=`\n--- OBSERVATIONS RÉCENTES ---\n`;
  S.recordings.slice(0,8).forEach(e=>{t+=`[${e.date} ${e.time}] ${modNames[e.module]||e.module} · ${fmt(e.dur||0)}\n`;if(e.obs)t+=`  ${e.obs}\n`;if(e.words)t+=`  Mots difficiles: ${e.words}\n`});
  t+=`\n--- DEMANDE D'ANALYSE ---\n`;
  t+=`Claude, analyse ce bilan et propose :\n`;
  t+=`1. Une évaluation de ma progression globale\n`;
  t+=`2. Les points forts et les axes d'amélioration\n`;
  t+=`3. Des adaptations d'exercices ciblées sur mes mots/sons difficiles récurrents\n`;
  t+=`4. Un ajustement de la durée ou de l'intensité des modules si nécessaire\n`;
  t+=`5. Des conseils pour les situations réelles (téléphone, présentations, conversations)\n`;
  t+=`\n=== FIN DU BILAN ===`;
  return t;
}
async function shareBilan(){
  const text=buildBilan();
  if(navigator.share){try{await navigator.share({title:"Bilan bégaiement",text})}catch(e){if(e.name!=="AbortError")copyBilan()}}else copyBilan();
}
function copyBilan(){
  navigator.clipboard.writeText(buildBilan()).then(()=>flashMsg("Copié !")).catch(()=>{const t=document.getElementById("bilan-ta");if(t){t.select();document.execCommand("copy");flashMsg("Copié !")}});
}
function dlBackup(){
  const data=JSON.stringify({journal:S.journal,recordings:S.recordings,exportedAt:new Date().toISOString()},null,2);
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([data],{type:"application/json"}));a.download="autotherapie-"+today().replace(/\//g,"-")+".json";a.click();
}
function importBackup(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(confirm("Importer ? Données actuelles remplacées.")){
      if(d.journal)S.journal=d.journal;
      if(d.recordings)S.recordings=d.recordings;
      save();render();flashMsg("Importé !");
    }
  }catch(err){alert("Fichier invalide.")}};r.readAsText(f);
}

      </div>

  const t=document.getElementById("j-text")?.value.trim();

}

const TABS=[["session","▶ Séance"],["modules","Modules"],["recording","Enregistrement"],["journal","Journal"],["export","Partager"]];
function render(){
  document.getElementById("tabs").innerHTML=TABS.map(([id,label])=>`<button class="tab${S.tab===id?" active":""}${id==="session"?" tab-s":""}" onclick="S.tab='${id}';render()">${label}</button>`).join("");
  let c="";
  if(S.tab==="session")c=renderSession();
  else if(S.tab==="modules")c=renderModules();
  else if(S.tab==="recording")c=renderRecording();
  else if(S.tab==="journal")c=renderJournal();
  else if(S.tab==="export")c=renderExport();
  document.getElementById("app").innerHTML=c;
}
